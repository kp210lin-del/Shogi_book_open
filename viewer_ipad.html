<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>将棋の本筋</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --rw:130px;
  --sq:min(64px,calc((100vw - var(--rw) - 22px) / 9));
}
body{
  font-family:"Hiragino Kaku Gothic Pro","Hiragino Sans","Yu Gothic",sans-serif;
  background:#1a1a2e;color:#e8e8e8;
  display:flex;flex-direction:column;height:100%;overflow:hidden;
}

/* ── main row (left panel + board) ── */
#main{
  flex:1;min-height:0;
  display:flex;flex-direction:row;
  padding:4px;gap:4px;overflow:hidden;
}

/* ── right panel ── */
#right-panel{
  flex:1;min-width:120px;
  display:flex;flex-direction:column;
  gap:5px;overflow:hidden;min-height:0;
  padding:0 4px;
}
#nav-row{
  display:flex;align-items:center;gap:3px;flex-shrink:0;
}
#progress{font-size:12px;color:#ccd;flex:1;text-align:center;white-space:nowrap;overflow:hidden}
.nav-btn,.ctrl-btn{
  background:#2a3a5a;border:1px solid #4460aa;color:#aaccff;
  padding:5px 8px;border-radius:6px;font-size:14px;
  cursor:pointer;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;flex-shrink:0;
}
.nav-btn:active,.ctrl-btn:active{background:#3a4a7a}
#turn-ind{
  font-size:12px;font-weight:bold;
  padding:5px 6px;border-radius:6px;
  background:#1e2a45;text-align:center;flex-shrink:0;
}
#choices{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.choice-btn{
  width:100%;padding:8px 5px;border-radius:7px;
  border:2px solid #4460aa;background:#1e2a45;color:#e8e8e8;
  font-size:12px;cursor:pointer;text-align:center;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  line-height:1.4;
}
.choice-btn:active{background:#2a3a60}
.choice-btn.correct{border-color:#44bb88;background:#1a3a2a;color:#88ffcc}
.choice-btn.wrong{border-color:#aa4444;background:#3a1a1a;color:#ffaaaa}
#reveal-btn{
  width:100%;padding:9px 4px;border-radius:7px;
  background:#2a3a60;border:1px solid #4466aa;color:#aaccff;
  font-size:12px;cursor:pointer;touch-action:manipulation;flex-shrink:0;
}
#reveal-btn:active{background:#3a4a70}
#answer-area{
  margin-top:8px;
  background:#1e2a45;border-top:2px solid #4466aa;
  padding:10px 14px;font-size:12px;line-height:1.7;
  overflow-y:auto;max-height:180px;
}
.hidden{display:none!important}
#correct-label{font-size:13px;font-weight:bold;color:#66ccff;margin-bottom:5px}
#action-row{display:flex;gap:4px;flex-shrink:0;}
.action-btn{flex:1;font-size:11px;padding:7px 2px;}
.info-box{
  background:#1e2a45;border-radius:7px;
  padding:6px 8px;font-size:11px;line-height:1.5;
  flex-shrink:0;overflow-wrap:break-word;
  margin-top:auto;
}
#diagram-caption{font-size:10px;color:#99aacc;margin-bottom:2px}

/* ── board column ── */
#board-col{
  flex:0 0 auto;align-self:flex-start;
  display:flex;flex-direction:column;
}
#board-section{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:flex-start;
}
.hand-row{
  width:calc(9 * var(--sq));display:flex;flex-direction:row;flex-wrap:wrap;
  gap:3px;padding:4px 6px;
  background:#b8963c;border:2px solid #888;
  min-height:calc(var(--sq)*0.75);align-items:center;
}
.hand-row.top{border-bottom:none;border-radius:6px 6px 0 0}
.hand-row.bot{border-top:none;border-radius:0 0 6px 6px}
.hand-empty{font-size:11px;color:#654;padding:2px 4px}
.hand-piece{
  width:calc(var(--sq)*0.75);height:calc(var(--sq)*0.75);
  background:#d4aa70;border:1px solid #999;
  display:flex;align-items:center;justify-content:center;
  font-family:"Hiragino Mincho Pro","Yu Mincho","HG明朝E",serif;
  font-size:calc(var(--sq)*0.42);font-weight:bold;
  position:relative;cursor:pointer;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  border-radius:2px;color:#111;
}
.hand-piece.gote{transform:rotate(180deg);color:#991100}
.hand-piece.selected{background:#ffe066!important;box-shadow:0 0 0 2px #ffa}
.count{
  position:absolute;bottom:1px;right:2px;
  font-size:calc(var(--sq)*0.25);font-family:sans-serif;
  color:#333;font-weight:normal;
}
#board-grid{
  display:grid;
  grid-template-columns:repeat(9,var(--sq));
  grid-template-rows:repeat(9,var(--sq));
  border-left:2px solid #888;border-right:2px solid #888;
  touch-action:manipulation;
}
.sq{
  width:var(--sq);height:var(--sq);
  border:1px solid #8a7040;
  display:flex;align-items:center;justify-content:center;
  background:#c8a55a;
  user-select:none;-webkit-user-select:none;
}
.sq.selected{background:#ffe066}
.sq.last-move{background:#e0c888}
.sq span{
  font-family:"Hiragino Mincho Pro","Yu Mincho","HG明朝E",serif;
  font-size:calc(var(--sq)*0.55);font-weight:bold;line-height:1;color:#111;
  pointer-events:none;
}
.sq span.gote{transform:rotate(180deg);color:#991100}
.sq span.promoted{color:#c82000}
.sq span.gote.promoted{color:#c82000}
#board-wrap{position:relative;display:inline-block}
#arrow-svg{position:absolute;top:0;left:2px;pointer-events:none;overflow:visible}

/* ── promote modal ── */
#promo-modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.65);
  justify-content:center;align-items:center;z-index:200;
}
#promo-modal.active{display:flex}
#promo-dialog{
  background:#1e2a45;border:2px solid #4466aa;border-radius:14px;
  padding:28px 32px;display:flex;flex-direction:column;
  gap:14px;align-items:stretch;min-width:220px;
}
#promo-dialog h3{text-align:center;font-size:18px}
.promo-btn{
  padding:16px;border-radius:8px;border:none;
  font-size:16px;font-weight:bold;cursor:pointer;touch-action:manipulation;
}
#promo-yes{background:#44aa77;color:white}
#promo-yes:active{background:#33996a}
#promo-no{background:#666;color:white}
#promo-no:active{background:#555}
</style>
</head>
<body>

<div id="main">
  <div id="board-col">
    <div id="board-section">
      <div class="hand-row top" id="hand-gote"></div>
      <div id="board-wrap">
        <div id="board-grid"></div>
        <svg id="arrow-svg" width="0" height="0"></svg>
      </div>
      <div class="hand-row bot" id="hand-sente"></div>
    </div>
    <div id="answer-area" class="hidden">
      <div id="correct-label"></div>
      <div id="answer-text"></div>
    </div>
  </div>
  <div id="right-panel">
    <div id="nav-row">
      <button class="nav-btn" id="prev-btn">◀</button>
      <span id="progress"></span>
      <button class="nav-btn" id="next-btn">▶</button>
      <button class="ctrl-btn" id="reset-btn">↺</button>
    </div>
    <div id="turn-ind"></div>
    <div id="choices"></div>
    <button id="reveal-btn">解答を表示</button>
    <div id="action-row">
      <button class="ctrl-btn action-btn" id="prob-btn">問題図</button>
      <button class="ctrl-btn action-btn" id="undo-btn">1手戻す</button>
    </div>
    <div class="info-box">
      <div id="diagram-caption"></div>
      <div id="situation-text"></div>
    </div>
  </div>
</div>

<div id="promo-modal">
  <div id="promo-dialog">
    <h3>成りますか？</h3>
    <button class="promo-btn" id="promo-yes">成る</button>
    <button class="promo-btn" id="promo-no">成らない</button>
  </div>
</div>

<script>
"use strict";
const PROBLEMS = [{"id": "初級編-001", "no": 1, "chapter": "初級編", "sfen": "ln1gk1snl/1r4gb1/p1pppp1p1/6p1p/sp7/2P3P1P/PP1PPPS2/1BG4R1/LNS1KG1NL b P 1", "caption": "問題図は△9五銀まで", "situation": "後手が棒銀で攻め込もうとしている局面。このまま放置して△8六歩▲同歩△同銀と攻められてしまうと、8筋が受からない。どのように対処するか。", "choices": [{"label": "A", "move": "▲9六歩", "expl": "銀取りに歩を突き出す。銀を追い返すことができれば、ひと安心。"}, {"label": "B", "move": "▲2二角成", "expl": "先手は角頭が不安なので、攻撃目標になっている角を交換しておく。"}], "correct": "B", "body": "将棋というゲームは、数で相手にまさることが基本だ。いま、同銀が狙っているのは先手の角頭、8七の地点。ここを守る先手の駒は金1枚だが、飛車と銀の2枚で攻める後手の戦力が1枚多くなっている。そこで、ここでは8七を補強する手段を考えるのが本筋。\n\nA▲9六歩は攻め駒にプレッシャーをかける手だが、▲9六歩と突いた手は手抜きで△8六歩と突かれてしまう。図は△9五歩と△同銀で取られた局面（失敗図）。手は△8七銀と銀を攻める手にしないと、8六歩（失敗図）で攻められてしまう。\n\nB▲2二角成が本筋。8七の弱点を補強しながら角を持ち駒にすることで、△8七銀を打てなくすることができる。これで8七の守り駒は足りている。"}, {"id": "初級編-002", "no": 2, "chapter": "初級編", "sfen": "ln5nl/1r2ggkb1/4sp1p1/ps1pp1p1p/1pp6/P1PPPPP1P/1PBS1G1P1/L2R2SK1/1N3G1NL b - 1", "caption": "問題図は△7五歩まで", "situation": "居飛車対振り飛車の対抗形。四間飛車に対して後手が棒銀で△7五歩と仕掛けてきた局面。振り飛車党なら、ぜひ覚えておきたい必修手筋で応接したい。", "choices": [{"label": "A", "move": "▲7五同歩", "expl": "歩がぶつかった場合は、素直に取っておくのが自然な考えだ。"}, {"label": "B", "move": "▲7八飛", "expl": "歩を取ると銀が手順に進んでくるので、飛車を寄って7筋に備える。"}], "correct": "B", "body": "棒銀という戦法は、銀が前に進んで飛車の前の障害物をどかし、竜を作るのが目的の戦法だ。逆に言えば、銀を進めさせなければ、容易には突破することができない。そう考えると、A▲7五同歩△同銀でやや相手の主張を通してしまっている意味がある。▲7六歩に△8四歩と引いてくれるならいいが、相手の主張を通してしまっている意味がある。\n\nかまわず△8六歩と突かれると▲同歩△同銀（失敗図）で突破されてしまう。以下▲7六歩△同銀▲7八飛△7五歩と引いておく。この手順で歩が本筋の考え方だ。\n\nB▲7八飛が本筋。▲6七銀（正解図）と引いておく。後手は本来銀をとめたい場所に歩を打っており、攻めが遠ざかっている。"}, {"id": "初級編-003", "no": 3, "chapter": "初級編", "sfen": "ln3kbnl/1r1s2g2/p1pp1gspp/4ppp2/1p5P1/2P1P2SP/PPSP1PP2/1BG4R1/LN1K1G1NL b - 1", "caption": "問題図は△4三金右まで", "situation": "相矢倉の序盤戦。先手は棒銀に出たところで、後手は金矢倉に組み、がっちり受け止める展開。どのように指しても一局の範囲だが、先手の方針を考えてほしい。", "choices": [{"label": "A", "move": "▲1五銀", "expl": "銀を出ていったからには前進していく。初志貫徹の姿勢。"}, {"label": "B", "move": "▲5八飛", "expl": "2筋は後手が固めているので、棒銀はうまくいかないとみて方向転換。"}], "correct": "A", "body": "将棋の考え方は、その前に指した手が生きるような手順を選ぶのがよいとされている。A▲1五銀（正解図）と出て、▲2四歩からの銀交換を狙っていく。▲4二角と受けられても▲7九角と引いて、やはり▲2三銀と銀を狙う。以下は▲2二角△2三銀▲同金△2四歩で進行の一例だ。\n\nB▲5八飛は棒銀をあきらめて中央から動く狙い。しかし、△6四歩▲6六銀△5四歩▲6六銀△5五歩（失敗図）で受けられているので、5筋の銀が取られてしまう。先手の局面はあまり失敗図で受けられているので、先手の作戦としたのだから、2六銀を生かす手順を考えたい。"}, {"id": "初級編-004", "no": 4, "chapter": "初級編", "sfen": "ln3g1nl/3rg1sk1/p1p1ppbp1/1ps3p1p/3p5/2PP1P2P/PPBSP1PP1/L2RG1SK1/1N3G1NL b - 1", "caption": "問題図は△6五歩まで", "situation": "四間飛車対右四間飛車の戦い。後手は通常、5四銀と腰掛ける形で仕掛けることが多い。7四銀型はよい形とはいえないので、どのような考え方で対処するか。", "choices": [{"label": "A", "move": "▲6五同歩", "expl": "右四間飛車の仕掛けに対し、突かれた歩は素直に取っておく。"}, {"label": "B", "move": "▲5六歩", "expl": "歩は取らずに放置しておく。△6六歩と取り込まれても▲同銀で問題なし。"}], "correct": "B", "body": "後手の7四の銀は悪い形で、銀がいなければ、△7四歩△7三桂と活用できるが、現状は8五歩△7三桂が使えない。A▲6五同歩△6六歩、5四銀（失敗図）と進んだら、形勢互角ながら、悪形の7四銀を手順に繰り替えされてしまうのがしゃくだ。\n\n先手の7四の銀が働かないように考えたいので、B▲5六歩と待機しておく。以下△6六歩△同銀▲6七銀△6五歩△7七角成▲同桂（正解図）の進行は、相手の手に乗りながら軽く指して振り飛車満足の分かれ。まだこれからの将棋だが、後手は7四の銀がお荷物で、この後の指し方が難しい。"}, {"id": "初級編-005", "no": 5, "chapter": "初級編", "sfen": "ln3g1nl/1r1sgskb1/p1pp1p1pp/1p2p1p2/9/1PPP5/P1B1PPPPP/1RS3K2/LN1G1GSNL b - 1", "caption": "問題図は△4二銀まで", "situation": "居飛車対向かい飛車の序盤戦で、8筋の歩を突き合っているところが珍しい。まだ出だしなので、どう指しても互角の範囲だが、7八の銀をどう使っていくかを問う。", "choices": [{"label": "A", "move": "▲8七銀", "expl": "次に▲9六銀と出て、▲8五歩△同歩▲同銀と攻めていく。"}, {"label": "B", "move": "▲6七銀", "expl": "自然な活用。駒は中央に、または自玉の近くに進めるのが基本的な考え方だ。"}], "correct": "B", "body": "将棋と狙いを持つことが大切だ。ただし、勝手読みは禁物。独善に陥ることがないようしないといけない。A▲8七銀は、▲9六銀の▲8五歩△同銀と進めば▲8六歩で、当然そうはならない。同銀と進めば▲8四歩を突かれて▲9六銀に△7三桂（失敗図）で受けられてしまう。\n\nこうなると銀が立ち往生で、銀が泣いてしまう。先手の作戦失敗は明らかだ。B▲6七銀は自然な指し手で、以下▲7四歩△6四歩、▲3八銀（正解図）と進む一例。これからの将棋、局面をリードしようとする意欲もあるが、▲3八銀は▲9六銀の筋が成立することは少なくそうだ。"}, {"id": "初級編-006", "no": 6, "chapter": "初級編", "sfen": "lnsgk2nl/4r1gb1/pppp1pppp/9/7P1/2PPpP3/PP1Gs1P1P/1B1S3R1/LN1GK2NL b SP 1", "caption": "問題図は△5七銀まで", "situation": "中飛車が速攻を仕掛けて動いてきた局面。銀を交換して銀を打ち込まれたところで、先手はしっかりと受ける必要がある。落ち着いて対処してほしい。", "choices": [{"label": "A", "move": "▲4七銀", "expl": "▲5七同銀は△同歩成でまずい。がっちりと銀を打って中央を補強する。"}, {"label": "B", "move": "▲5八歩", "expl": "歩で受けておく。こうすれば5七の地点に、と金を作られることはない。"}], "correct": "A", "body": "強引な攻めは、しっかりと受けることができれば無理攻めとなる。対応を誤ると、ひどいことになってしまうので注意が必要だ。\n\n△5七銀と打ち込まれたところで、慌てて△同銀と取るのは△同歩成となり、一番まずい。ここはA▲4七銀（正解図）と受けておくのが手堅い指し方だ。以下△6八歩成▲同玉△8五歩▲7八玉、で受け切る。次に▲5八歩と打つことができれば安心。\n\nB▲5八歩もしっかりした受けだが、△4六銀成と逃げられる。以下▲4八飛で銀取りが受かるが、▲4八飛△5五銀（失敗図）と進むと、一歩損で先手不満だ。"}, {"id": "初級編-007", "no": 7, "chapter": "初級編", "sfen": "ln3g1nl/1r3skb1/1gpspp1p1/p2p2p1p/1pP6/P1RP1P2P/1P1SP1PP1/1B2G1SK1/LN3G1NL b - 1", "caption": "問題図は△8三金まで", "situation": "先手の三間飛車石田流に対し、後手は△8三金と上がって、棒金で押さえ込む作戦を採ってきた。これに対する、今後の振り飛車の方針を考えてほしい。", "choices": [{"label": "A", "move": "▲7七桂", "expl": "▲7七桂と跳ね、次に▲9七角と上がるのが石田流の理想形だ。"}, {"label": "B", "move": "▲7七角", "expl": "後手は△8四金から先手の飛車を狙ってくるので、▲6五歩から角交換で反発する。"}], "correct": "B", "body": "棒金戦法の目的は、石田流の飛車角を押さえ込むことだ。従って、振り飛車は封じ込まれないように、さばきで対抗したい。\n\nA▲7七桂、▲9七角は好形だが、この場合は正直すぎる。△7四歩▲6四歩△7四角△8四金△7五歩△同歩（失敗図）と進むと逆効果だ。今の手順は石田流にとって最悪の変化。指した手がマイナスになっており、このような進行は避けたい。\n\nB▲7七角として△7四歩には▲6五歩（正解図）と反発して互いの形勢、振り飛車美濃囲いの堅さを生かして大さばきを狙い、居飛車囲いは暴れられないようにじっくり指す方針だ。"}, {"id": "初級編-008", "no": 8, "chapter": "初級編", "sfen": "ln5nl/2r1ggk2/3psp1p1/ps2p1p1p/1p7/P1SbPP2P/1P4PP1/L1RBG1SK1/1N3G1NL b P2p 1", "caption": "問題図は△6六角まで", "situation": "居飛車対振り飛車の対抗形から、後手が棒銀で仕掛けた展開。先手は△6六角と歩をタダで取られて一歩を損した。振り飛車らしく切り返してほしい。", "choices": [{"label": "A", "move": "▲6七銀", "expl": "銀を引いて角に当てながら、飛車交換を迫って大さばきに出る。"}, {"label": "B", "move": "▲7七歩", "expl": "△9九角成や、△7七歩▲同角△7六飛などの狙いを防いで手堅く守っておく。"}], "correct": "A", "body": "振り飛車対棒銀など急戦の場合は、居飛車の舟囲いに対して美濃銀がさん多くあるので堅い。従って、飛車交換などの大さばきはおおむね、振り飛車が望める。\n\n以上の理由で、A▲6七銀（正解図）が絶好の一手。角取りなので、居飛車は飛車交換を避けることができない。\n\nB▲7七歩は消極的、有効な飛車のさばきも遠ざかる。手は△7五銀▲同銀△2二角（失敗図）と引かれて、次に△2二角を狙われて先手苦戦、自分の飛車の真上に歩を打つ手は、ほとんど悪手だ。"}, {"id": "初級編-009", "no": 9, "chapter": "初級編", "sfen": "ln1g3nl/1ks4r1/1p1gs1b2/p1pppppBp/9/P1PPP1P1P/1P1G1PS2/1KS4R1/LN1G3NL b Pp 1", "caption": "問題図は△2二飛まで", "situation": "先手が▲2四歩△同歩▲同角と動いたときに、後手が△2二飛と回って受けるのは振り飛車の常用手段。ここで強く攻めるか、穏やかな流れにするか。", "choices": [{"label": "A", "move": "▲3三角成", "expl": "チャンスと見て踏み込む。一気に終盤戦にしてしまう強攻策。"}, {"label": "B", "move": "▲2五歩", "expl": "戦いを先送りにして、新たな展開を目指していく。"}], "correct": "B", "body": "一気に終盤戦に持ち込む変化は、先手に権利がある。自信があれば踏み込めばよいし、苦しいと判断すれば見送ってこむ。\n\nA▲3三角成△2八飛成、以下△同飛△3三桂、▲2八飛（失敗図）と進めば、先手は飛車を先着できるが、2八銀は遊び駒なのに対し、5三銀は守りについている。難しいところはあるものの、居飛車を持ちたくない局面だ。\n\n従って、B▲2五歩を選びたいところになる。以下△4五角▲7九桂▲4八角▲6六角▲4七桂△3三桂、▲4六歩（正解図）の一例で、これからの将棋だ。先手は▲3七の銀を中央に活用する展開が望ましい。"}, {"id": "初級編-010", "no": 10, "chapter": "初級編", "sfen": "ln1g3nl/1ks4r1/1p1g1sbp1/p1ppp1p1p/5p1P1/PPPPP1P1P/1SBG1PS2/1KG4R1/LN5NL b - 1", "caption": "問題図は△4五歩まで", "situation": "居飛車対振り飛車の対抗形から先手は銀冠、後手は高美濃に囲いを発展させた展開。持久戦模様の中盤戦から、そろそろ駒がぶつかりそうだが、先手はどのように動いていくか。", "choices": [{"label": "A", "move": "▲2六銀", "expl": "棒銀戦法で、▲3五歩△同歩に▲同銀や、▲3八飛で動いていく。"}, {"label": "B", "move": "▲4六歩", "expl": "△4六同歩に▲同銀として、中央に手段を求めていく展開。"}], "correct": "B", "body": "将棋の考え方の一つに、駒を中央に進めていくという考え方がある。指し手に迷うときは、自玉や敵玉に駒を近づけるのが有力だ。\n\nA▲2六銀は棒銀で仕掛ける狙いだが、△5五歩▲2六銀△5四同角、▲3七銀△4四銀と進むと振り飛車十分。先手は何をやっているのか分からない。\n\nB▲4六歩と突き、△同歩▲同銀と一目の将棋。先手はすでに銀冠に組み、持久戦で戦うつもりが、急戦になると目的の急戦になる。中央に使える展開で、▲3七桂（正解図）で一例の将棋になる。3七桂は▲2六飛はバランスを崩した構想といえる。"}, {"id": "初級編-011", "no": 11, "chapter": "初級編", "sfen": "ln1gk1snl/6gb1/p2ppp1pp/1rp6/2s3p2/5S3/PPPPPP2P/1BGS3R1/LN2KG1NL b P2p 1", "caption": "問題図は△7五銀まで", "situation": "相掛かり戦の出だしから、後手は素早く銀を繰り出し、8筋からの攻めを狙ってきた。角頭を受ける手はなさそうだが、ピンチを切り抜ける手段は？", "choices": [{"label": "A", "move": "▲3五銀", "expl": "先手は角頭を受ける適当な手がないので、攻め合いを目指す。"}, {"label": "B", "move": "▲7六歩", "expl": "角交換を狙う。攻撃目標になっている角をさばく。"}], "correct": "B", "body": "△8六歩△同銀からの攻めを受ける手段は、部分的にはない。しかし、後手陣には重大な欠陥がある。\n\nA▲3五銀と出て、同じように角頭を攻めていくのは、△8六歩▲同銀△同銀（失敗図）と攻められて後手のほうが速い、この攻め合いは分が悪そうだ。\n\n相手の攻めを呼び込むようだが、B▲7六歩が相手の弱点を突く好手。△2二角成△同銀▲9五角（成功図）が準王手飛車となる。▲7六歩の意味する△6五歩を取れることができないため、後手は銀を繰り出す前に△9四歩や△4一玉など、角打ちの筋を防いでおく必要があった。"}, {"id": "初級編-012", "no": 12, "chapter": "初級編", "sfen": "ln1g1k1nl/1r3sgb1/p2p1p1pp/3sp1p2/1pp6/2PPP1P2/PPS2P2P/2GBGS1R1/LN1K3NL b P 1", "caption": "問題図は△7五歩まで", "situation": "相居飛車の戦いで、先手が矢倉模様に進めると、後手は早繰り銀から急戦で仕掛けてきた。うまく対処しないとつぶされてしまうので、しっかりと受け止めたい。", "choices": [{"label": "A", "move": "▲6七金右", "expl": "金矢倉に組み上げ、上部に手厚い構えを作って攻めを食い止める。"}, {"label": "B", "move": "▲7五同歩", "expl": "歩がぶつかって放置するのは取り込まれてしまう。取る手から考えることが基本だ。"}], "correct": "B", "body": "後手の仕掛けが速く、先手は立ち遅れ気味。▲7五同歩△同銀返せればよいが、この場合は▲6八歩△同銀（失敗図）で先手不利。\n\nA▲6七金右と備えるが、▲7五歩△失敗図と△6四歩△6五歩、▲同歩△9七同同銀で先手不利、△7六歩△6五銀と引くようでやはり苦しい。\n\nB▲7五同歩を取ってみたい。△同歩▲同銀▲4六角（正解図）が期待の反撃。△6四歩を取り、▲6七金右と上がっておき、一局。ただし、先手は問題図の前で▲6七金右と上がっており、△7五歩△同歩▲同銀▲6四歩から金を取りたかった。"}, {"id": "初級編-013", "no": 13, "chapter": "初級編", "sfen": "ln2b1gnk/1r5sl/3spg1p1/p1pp1pp1p/1p2P4/P1P1SPP1P/1PBP3P1/4R2SL/LN3GGNK b - 1", "caption": "問題図は△5一角まで", "situation": "先手が5筋位取り中飛車から穴熊に囲うと、後手も追随して相穴熊となった。問題図は3三の角を引いた局面。中央が薄くなったので、そこに目を向けたい。", "choices": [{"label": "A", "move": "▲4五歩", "expl": "後手が角を引いたところなので、4筋が狙い目だ。"}, {"label": "B", "move": "▲5四歩", "expl": "開戦は歩の突き捨てから。先手は角筋を通して攻めを狙う。"}], "correct": "A", "body": "中盤は駒をぶつけて戦いが始まる。同じ駒を交換でも、価値の高い駒と低い駒を見極める目を養いたい。\n\nA▲4五歩は自然で、△同歩▲同銀（成功図）と進めば先手が指せる、これは△3三角と戻るようでは後手失敗。\n\nB▲5四歩は方向が違う。5筋の歩を突き捨てるのは、よほどの利点があるときに限る。△同歩△同銀（失敗図）の変化のように、5六歩と4三金の交換するのは気が進まない。成功図のように、5六歩と4三銀の交換は先手の得分だが、6二の金と4三金の交換するのは気が進まない。"}, {"id": "初級編-014", "no": 14, "chapter": "初級編", "sfen": "1n3k1nl/1r2gsgb1/3p1p1pp/1sp3p2/lp5P1/2PP1PP2/1PSG1S2P/1BG4R1/LN1K3NL b 2P2p 1", "caption": "問題図は△9五同香まで", "situation": "相居飛車の矢倉模様から、後手が棒銀で先攻してきたところ。このような局面、△9五同香では△同銀が定跡だ。この手をとがめる手段を考えてもらおう。", "choices": [{"label": "A", "move": "▲9五同香", "expl": "素直に取っておく。香と香の交換なので、互角だろう。"}, {"label": "B", "move": "▲9六歩", "expl": "平凡な▲9五同香は相手の言い分を通すことになるので、歩を打って相手の出足を止める。"}], "correct": "B", "body": "棒銀は飛車先の歩や、銀を交換することが狙いとなる。守備側は五段目に銀を出させないようにしたい。\n\nA▲9五同香は相手の思惑通り。△同銀（失敗図）で、次に△8二飛△9六歩、素直に香交換に応じるのは、先手不満だ。\n\nここはB▲9六歩と受けたい。5筋で1歩を持っていることもあり、△同香に▲9五歩と打てる。今の手順中、▲9七同香成▲同桂、または香を取り返えるしまうので注意が必要。"}, {"id": "初級編-015", "no": 15, "chapter": "初級編", "sfen": "l6nl/1kg4r1/1sngp1bp1/pppp1pp1p/5s1P1/PPPPP1P1P/1SNGSP3/1KGB2R2/L6NL b - 1", "caption": "問題図は△2二飛まで", "situation": "△2二飛と回った手は、次に△2四歩▲同歩△同飛を狙っている。今の手順のように、飛車をさばかれては先手がまずい。その手を防ぐか、それとも他に手段を求めるか。", "choices": [{"label": "A", "move": "▲4六歩", "expl": "4五の銀が目障りなので、取りあえず銀を追い返しておく。"}, {"label": "B", "move": "▲5五歩", "expl": "2筋を突破されるのも怖いが、銀挟みで駒得を狙う。"}], "correct": "B", "body": "有利、不利を判断する力が大局観で、これが間違っていると正しい手は指せない。相手の主張と自分の主張、どちらがまさっているか、しっかり見極めたい。\n\nA▲4六歩は△5四銀と引く一手。そこで▲2八飛、あるいは▲3五歩△同歩△4三銀（変化図）と進み、これからの将棋となる。\n\nよさを求めるならB▲5五歩で、後手は△2筋の歩、以下△2六歩△同銀△2七歩△2八飛△2七歩成▲4八飛△3八銀▲4三歩成（正解図）が一直線の手順だ。銀桂交換の駒得だし、先手のと金のほうが後手玉に近いので居飛車が指せる。"}, {"id": "初級編-016", "no": 16, "chapter": "初級編", "sfen": "lr5nl/4ggkb1/3s3p1/p1p1spp1p/1p2+B4/P1P1PPPPP/1PRS1GN2/6SK1/L4G2L b NPn2p 1", "caption": "問題図は△5四銀引まで", "situation": "先手は馬が手厚いし、高美濃囲いが堅いので振り飛車十分の形勢。馬取りになっているが、決めに出るか。それとも、じっくり指すかの判断を問う。", "choices": [{"label": "A", "move": "▲6四歩", "expl": "馬を取られることになるが、二枚替えで駒得を狙う攻め。"}, {"label": "B", "move": "▲6六馬", "expl": "「馬は自陣に引け」の格言通り。局面が長引けば馬と生角の差が出る。"}], "correct": "A", "body": "形勢が少しよいときの指し方は難しい。一気に差を広げようとして、ボイントを重ねていくのも辛抱が必要。勝つまでは大変なのだ。\n\nA▲6四歩は△5五馬一手。以下▲6三歩成△同金▲5五歩（正解図）で銀二枚と角の交換で先手駒得となる。次に▲7二銀があるので形勢有利。\n\nB▲6六馬は自重した手だが、△5三金寄のような手なら、七馬の意味からも振り飛車優勢。七飛の味なら△6五銀▲5六歩、後手も△6六歩△同飛△4五歩などの味があり、楽しみを与えてしまう。"}, {"id": "初級編-017", "no": 17, "chapter": "初級編", "sfen": "ln1gk2nl/1r4g2/p1pspp1pp/3p2R2/9/2P6/PP1PPPP1P/1SG1K1G2/LN5NL b BS2Pbsp 1", "caption": "問題図は△6三銀まで", "situation": "先手の棒銀がうまくいって、銀交換に成功した。▲3四飛と横歩を取ったときに、後手は飛車の横利きを生かして△6三銀と上がって金取りを受けたが、何か手段がありそうだ。", "choices": [{"label": "A", "move": "▲8三銀", "expl": "後手の飛車を移動させれば、▲3二飛成が生じる。"}, {"label": "B", "move": "▲1八角", "expl": "6三の銀を狙った遠見の角打ち。この地点の自陣角は好手が多い。"}], "correct": "A", "body": "問題図からゆっくり指すなら、▲3六飛と2六飛と戻しておく、1歩なので先手満足な分かれ。しかし、不安定な後手陣に目を向け、動いていきたい局面だ。\n\nA▲8三銀（正解図）は△同飛なら▲3二飛成があるので取れない。△6二飛も▲8二角成が指せる。\n\nB▲1八角は一見、好手風。8二銀に対して△3二歩も考えられるが、8二銀の歩成の銀を△3四角で、やはり先手よし。しかし、△5四歩（失敗図）とされると角の働きがいまーつで継続手段が難しい。"}, {"id": "初級編-018", "no": 18, "chapter": "初級編", "sfen": "ln5nl/1skgg4/Pppppsb2/7rp/p2S1p3/1R1B4P/2NPPPPP1/4G1S2/L4GKNL b P3p 1", "caption": "問題図は△4五歩まで", "situation": "相振り飛車から先手が先攻して満足な中盤戦。後手も△4五歩と突き、飛車の横利きを通しながら角交換を挑んで反撃してきた。ここは休まず攻めを継続したい。", "choices": [{"label": "A", "move": "▲7四歩", "expl": "飛車の横利きを止めつつ、後手の玉頭に嫌味を付ける。"}, {"label": "B", "move": "▲8五桂", "expl": "桂を跳ねて、▲9二歩成〜▲9三歩などの攻めを狙う。"}], "correct": "A", "body": "一方的に攻めることができる状況は望ましいが、相手の反撃に気をつけないといけない。逆に、攻めの駒を貴められる展開になると焦るようになる。\n\n△9四歩で駄目。先手は▲9五を走りたいが、A▲7四歩は力をためすた手で、△9五香（正解図）がある。これからの中盤戦だが、先手は主導権を握って満足な分かれ。\n\nしかし、B▲8五桂も指したい手だ。△同歩なら▲7七角、△同歩、△6六角成、▲同飛で（失敗図）と打たれる手が嫌味だ。8七飛も嫌味、△7七飛があり、馬を作られたあと△9九成、いずれも馬を作られて先手が忙しい局面となる。"}, {"id": "初級編-019", "no": 19, "chapter": "初級編", "sfen": "l4g1nl/6k2/2nSs1bp1/pr1s1pp1p/1pp6/P3p1P1P/1P1P1P1P1/7SL/LN1GR1GNK b GPb2p 1", "caption": "問題図は△7五歩まで", "situation": "先手は中飛車から穴熊に囲い、後手が急戦を仕掛けた展開。角金交換の駒損ながら、玉の堅さでまさるため振り飛車ペース。手番を生かし、攻めを続けていきたい。", "choices": [{"label": "A", "move": "▲5六飛", "expl": "飛車を止められているので、遊び駒を活用する自然な一着。"}, {"label": "B", "move": "▲5四歩", "expl": "6三の銀が攻めの種駒。この駒を生かして攻めを繰り出す。"}], "correct": "B", "body": "先手の穴熊は堅陣なので攻撃に専念できる。攻めが切れないように、丁寧な手段を繰り出していきたい。\n\nA▲5六飛は飛車を使って本筋のようだが、△4五角（変化図）が両取りになる。▲5三飛成△同銀▲同二角成は無理筋だ。本来、飛車の取り合いは望むところだが、8四の金が遊び駒なので先手不利。\n\nB▲5四歩が俗手ながら確実な手段。▲4二銀引が厳しい。▲5四同金なら6四歩△4三飛△6四歩と確実な手順。▲7三歩△6四金で先手で7三歩成▲4二飛成と進む。先手成銀で先手よし、▲5四歩で攻めが急所となる。"}, {"id": "初級編-020", "no": 20, "chapter": "初級編", "sfen": "ln1g2gnl/1r3sk2/3p1p1p1/p2sp1p1p/1p1P5/P1p2PP1P/1PS1P2P1/3RG1SK1/LN3G1NL b Bbp 1", "caption": "問題図は△7六歩まで", "situation": "居飛車がエルモ囲いから急戦を仕掛けてきた。角交換となり、お互い銀取りになっている局面。歩を払うか、銀を取るか迷うところ。振り飛車らしくさばいてほしい。", "choices": [{"label": "A", "move": "▲7六同銀", "expl": "歩を払っておけば銀取りの先手。後手は銀を逃げることになるので手番が回ってくる。"}, {"label": "B", "move": "▲6四歩", "expl": "銀の取り合いは互角。その後、飛車の活用が見込めそう。"}], "correct": "B", "body": "居飛車の仕掛けはやや単調だった。問題図は振り飛車がさばきそうな雰囲気が漂っている。\n\nA▲7六同銀△5五銀（変化図）とかわされて、次に△8六歩△同歩、あるいは△7七、あるいは△3六歩と強く戦っても、振り飛車まずまずだ。\n\nB▲6四歩で振り飛車が十分だ。以下▲7歩成△同飛△6四歩△6四同飛（正解図）とさばいて先手優勢。先手の飛車は軽い形で成り込めそうなのに対し、後手の飛車先は重い。駒の損得はないものの、玉の堅さや駒の働きでまさる振り飛車が指せる。"}, {"id": "初級編-021", "no": 21, "chapter": "初級編", "sfen": "ln1g4l/1ks6/1ppg1pn2/P2psbprp/pS2p4/1R1P4P/2B1PPPP1/4GGKS1/LN5NL b P2p 1", "caption": "問題図は△3三桂まで", "situation": "相振り飛車の中盤戦。先に攻勢を取った先手は、9筋に歩を垂らして嫌味をつけている。端のアヤを生かし、ここからも攻めを続けていきたい。", "choices": [{"label": "A", "move": "▲9五香", "expl": "香を走り、△9二歩と受けさせて端を詰めておく。"}, {"label": "B", "move": "▲9三歩成", "expl": "歩を成り捨てて後手陣を乱し、その対応によって攻めを変える指し方。"}], "correct": "B", "body": "端攻めは、どのような戦型でも頻繁に出てくる攻略法。美濃囲いの端攻めて、玉に直接攻めかかれるので特に有効だ。\n\nA▲9五香は自然な指し手で、後手は9筋を詰めて十分に思えるが、この後の指し方が意外と難しい。\n\nここはB▲9三歩成と受けることになる。軽手で、先手の攻めが続く。△同香は▲9四歩で香得となる。△8四同金▲9五歩△8二玉▲9四歩で香得。また△9三同桂は▲7六銀と引いて先手有利となる。次に▲9四歩を見てやはり先手が指せる。"}, {"id": "初級編-022", "no": 22, "chapter": "初級編", "sfen": "lnrg2gnl/5skb1/1B1p1p1p1/ps2p1p1p/1p1P5/P1S2P2P/LPR1P1PP1/4G1SK1/1N3G1NL b Pp 1", "caption": "問題図は△7一飛まで", "situation": "居飛車がエルモ囲いから、棒銀で急戦を仕掛け、振り飛車も反撃して中盤戦を迎えている。8三の角を生かした、振り飛車らしい軽いさばきで対応してほしい。", "choices": [{"label": "A", "move": "▲6四歩", "expl": "歩を突き捨てておく。8三角の可動域を広げる狙い。"}, {"label": "B", "move": "▲7二歩", "expl": "△7七角成〜△7六飛の筋があるので、後手の飛車先を止める。"}], "correct": "A", "body": "振り飛車は居飛車の仕掛けに対し、身構えながら反撃するのが、飛車角の活用法を常に考えていた。\n\n振り飛車党ならA▲6四歩（正解図）で、取りあえず突き捨てておきたい。△同歩と取らせることにより▲5六角成と自陣に成り返る手もついている。この局面はもう▲5六角成がある。\n\nB▲7二歩はタイミングで、4角成△7三金（失敗図）で、馬を補捉されて先手がまずい。このようなとき、6筋の歩を突き捨てていればもう▲5六角成がある。"}, {"id": "初級編-023", "no": 23, "chapter": "初級編", "sfen": "lr5nl/3gpgk2/p1n2p1p1/2psP1p1p/9/2P2P2P/PPN3PP1/2G3SK1/L3RG1NL b BSPbs2p 1", "caption": "問題図は△6四同銀まで", "situation": "ゴキゲン中飛車が成功して先手が指しやすい展開。陣形の差も歴然としているし、5筋を押さえているのもポイントだ。ここで緩まず、リードを広げる攻めを繰り出したい。", "choices": [{"label": "A", "move": "▲3六角", "expl": "遠見の自陣角。後手の飛車に狙いを定めつつ、敵陣をにらむ。"}, {"label": "B", "move": "▲6三銀", "expl": "飛車と金の弱点となる銀打ち。露骨ながら、後手陣の欠陥を突く攻め筋。"}], "correct": "B", "body": "駒の損得こそないものの、中飛車有利に運んでいる。後手に立ち直りを許さず、攻めを続けていきたい。\n\nA▲3六角は、見、好手風で痛得が大きい。しかし、△6三歩（失敗図）と狙いを防がれると一矢を報い大変な将棋となる。\n\nB▲6三銀と打ち込むのが厳しい一手だ。角換わり腰掛け銀の手筋。この手筋はよく出てくるので覚えておきたい。△6三同金▲6二飛成、▲4二角▲6四金、では先手が指せる、後手は銀取りを防ぐ有効な手段がないことを確かめてほしい。"}, {"id": "初級編-024", "no": 24, "chapter": "初級編", "sfen": "ln1g3nl/1ks1gr3/1p2p1bpp/p1p1s1p2/3p1p1P1/PPPPP4/1KS2PP1P/2S1G2R1/LNBG3NL b - 1", "caption": "問題図は△6五歩まで", "situation": "天守閣美濃と四間飛車の中盤戦。駒組みがほぼ完了して、後手が△6五歩と積極的に動いてきた局面だ。まだこれからのようだが、先手の対応を問う。", "choices": [{"label": "A", "move": "▲2四歩", "expl": "後手の動いてきた手に対し、先手も機敏に反撃していく。"}, {"label": "B", "move": "▲6七金", "expl": "ひとまず6筋を受ける。四枚美濃が完成して満足な展開。"}], "correct": "A", "body": "振り飛車の美濃囲いは堅陣だが、玉のコビンが開いているところに着目したい。\n\nA▲2四歩は角頭を突く好手。以下△同歩△同角、▲2二飛△2三歩（正解図）と進む。△同飛なら△2三角成△同桂、また△2三歩なら△4二飛成も先手好調。\n\nB▲6七金は上部に固めるが、▲4六銀△6五歩△7九銀引△7三桂（変化図）が進行の一例で、これは一局の将棋だ。"}, {"id": "初級編-025", "no": 25, "chapter": "初級編", "sfen": "l6nl/2r3gk1/3p1gspp/1p1b1p3/Pn2P1PP1/2PP1PS2/1P1G4P/2GB3R1/LN1K3NL b S3Psp 1", "caption": "問題図は△6四角まで", "situation": "相矢倉の中盤戦。7筋で銀交換が行われ、一段落したところ。後手の矢倉囲いは3筋にキズを抱えている。弱点を突いた攻め筋を考えてほしい。", "choices": [{"label": "A", "move": "▲3四銀", "expl": "銀を打ち込んで金銀を剥がす攻め。露骨ながら、確実に守備の駒と交換できる。"}, {"label": "B", "move": "▲3四歩", "expl": "拠点を放棄するようだが、歩を突き出す軽い攻め。"}], "correct": "B", "body": "将棋には軽い攻めと重厚な攻めがあり、局面に応じて使い分けたい。攻めが軽すぎると切れてしまうし、重たい攻めになってしまうと渋滞して使い分け、重たい攻めになってしまうと印象。\n\nA▲3四銀（変化図）は有力だが、やや重い。後手は△同銀▲同金と清算する手もあるし、放置することも考えられる。\n\nB▲3四歩（正解図）と突き出すのが軽い手だ。歩の突き出しに後手は放置できず、歩△同銀でも8三五歩で銀（金）が捕獲される。なら△3四歩△4一金、いずれで取っても先手で銀（金）が捕獲される。2五歩、△2四歩の気配で、攻めを続けることができる。"}, {"id": "初級編-026", "no": 26, "chapter": "初級編", "sfen": "l6nl/1r4gk1/4bg1p1/p1psppp1p/1p1n5/P1PSP3P/1P1G1PN2/1KG4R1/LNB5L b S2Ps2p 1", "caption": "問題図は△6四銀まで", "situation": "相矢倉の中盤戦。先手が先攻して銀交換に成功したため、後手玉が薄くなっている。後手の反撃も警戒して次の攻めを繰り出したいが、どこに目を向けるか。", "choices": [{"label": "A", "move": "▲1五歩", "expl": "後手陣は銀がいないので端が弱い。△1五同歩に▲1三歩の要領だ。"}, {"label": "B", "move": "▲2四歩", "expl": "後手の矢倉は2筋が弱点。▲2四歩と玉頭から攻めていく。"}], "correct": "B", "body": "囲いの急所は局面によって異なる。それを的確に見極められるような、正しい大局観を養いたい。\n\nA▲1五歩は急所を突いた攻撃で、△同歩に▲1三歩で攻めが続く影もが、ただし、そこで後手も△8六歩△同歩△8五歩△同歩△8六歩（失敗図）と継ぎ歩で反撃してくる。\n\nここはB▲2四歩が正しい攻め方だ。以下△2四同歩、▲5一角成（正解図）で先手よし、今度は継ぎ歩で攻められても、玉から脱出できる、4一銀が遅い寄せとなる。"}, {"id": "初級編-027", "no": 27, "chapter": "初級編", "sfen": "ln5nl/2r1ggkb1/p3sp1p1/3pp1p1p/2s6/1P1PPP2P/P2SB1PP1/LpR1G1SK1/1N3G1NL b 2P 1", "caption": "問題図は△8八歩まで", "situation": "居飛車対振り飛車の対抗形。後手が棒銀で仕掛けてきた展開。△8八歩と打つ手では、△7六歩と押さえ込むほうがまさった。桂取りに対して、どう応じるか。", "choices": [{"label": "A", "move": "▲8八同飛", "expl": "このまま桂を取らせるわけにはいかないので歩を払っておく。"}, {"label": "B", "move": "▲6五歩", "expl": "後手の歩切れに乗じて、大さばきに出るチャンスだ。"}], "correct": "B", "body": "振り飛車を指すうえで大切なことは、飛車交換に持ち込むこと。さばくのもあるいは飛車交換に持ち込むことだ。飛車を押さえ込まれ、いじめられる展開は避けていきたい。\n\nA▲8八同飛は手で自然だが、後手の角筋に入る。△6五歩を助長する手で、後手の角筋に入る。△6五歩（変化図）と突かれて難しい戦いだ。\n\nここはB▲6五歩と決戦に持ち込むほうが分かりやすい。後手に歩があれば△7六歩と突き出して押さえ込まれる。現状は歩切れには△8六歩△7五同角（成功図）まで、いくらでも発揮できる、飛車交換になれば、美濃囲いの堅さが生きる。"}, {"id": "初級編-028", "no": 28, "chapter": "初級編", "sfen": "ln2g2nl/2ks2g2/pppp2b2/4psp1p/9/2P1P1P1P/PP1P2N2/1BKSGS3/LN1G4L b R2Pr2p 1", "caption": "問題図は△4四同銀まで", "situation": "急戦向かい飛車から、飛車交換を挑んできたときに、先手も強く応じて大決戦となった。後手陣は角と銀の形が重い。陣形の弱点を突いて攻めていきたい。", "choices": [{"label": "A", "move": "▲2五桂", "expl": "持ち駒の飛車と歩、そして角筋が通っていることを生かす攻め。"}, {"label": "B", "move": "▲4五歩", "expl": "銀取りに歩を打って攻めを継続する。銀を移動させて角交換を狙う。"}], "correct": "A", "body": "振り飛車の角と銀はよい形ではなく、居飛車の角がにらみを利かしできるので、それをどかせば、4四の銀がタダ取りできるのだ。それを考慮に入れて検討していきたい。\n\nA▲2五桂と角取りに桂を跳ねる。△2四角や△2四角なら4四同角を取りに桂をはねる。、4四角で先手よし。従って、△2四角で4四角を取り角と桂を打ち捨てる。以下△2三歩△同歩△2三飛（成功図）で先手有利よし。\n\nB▲4五桂と角を打ちぬけ、▲4三歩△同金が二角の一手だ。従って、△3三角成△同桂（失敗図）と進むと、桂得だが（失敗図）で先手不利。"}, {"id": "初級編-029", "no": 29, "chapter": "初級編", "sfen": "l4rkn1/6g2/2n1p2pl/2ppg1ps1/P3sP2p/1PPP1BP2/2S1P1N2/2G2G3/LNK4RL b SPb4p 1", "caption": "問題図は△5五銀まで", "situation": "角換わり腰掛け銀の戦い。先手は自陣角を放って局面を打開していったが、△5五銀と打たれて角を捕獲されたところ。駒損は避けられないが、代償をどこに求めるか。", "choices": [{"label": "A", "move": "▲5五同角", "expl": "こちらの銀を取れば△同金で金が上ずる。そこにつけ込んで攻めを狙う。"}, {"label": "B", "move": "▲2四角", "expl": "角と銀の交換でも、後手玉に近い守備駒なので価値が高い。"}], "correct": "B", "body": "駒の損得は大切だが、駒損しても見合う対価があれば一向、中盤から終盤に入るところなので、状況判断が重要となるところだ。\n\nA▲5五同角は△同金で、この金を目標に攻めを続ける考えだ。しかし、△4四銀と打って△5四金（失敗図）と引かれて、もうひと押しが足りない。\n\nB▲2四角と、こちらの銀を取るのが正攻法だ。以下△同歩、▲4四同香（成功図）で先手の攻めが続く。1四の香が受けにくい、▲2三銀と絡める手もあり、後手は取らせ取り問題になる。"}, {"id": "初級編-030", "no": 30, "chapter": "初級編", "sfen": "3+R2snk/+R5g2/p2p1gsp1/3+b1ppll/8p/P1+b1P4/2+p1SPPP1/3PG1SK1/5G1NL b 2N2Pl3p 1", "caption": "問題図は△1四同香まで", "situation": "居飛車穴熊は金銀4枚に加え、馬もよく利いているので攻略が難しそう。しかし、2枚竜の存在も迫力があるし、1筋に嫌味をつけているので手段がありそうだ。", "choices": [{"label": "A", "move": "▲5五桂", "expl": "守りの駒を剥がしていく攻め。小さな駒で金銀を削っていくのが有効となる。"}, {"label": "B", "move": "▲1三歩", "expl": "桂香がいない囲いはもろい。穴熊の桂香を上ずらせ、弱体化させる攻め。"}], "correct": "B", "body": "穴熊の攻略法は、金銀を剥がしていくことが肝心。しかし、A▲5五桂は△1二香△4三桂成△同馬（失敗図）と、後手に桂を渡したのので△3六桂の攻め筋もしている。失敗図からは△1六歩と銀を逆襲されそうだし、今すぐには詰まないが、後手に桂を渡した、ので△3六桂の攻め筋もしている。\n\nB▲1三歩（正解図）が好手。次は▲3二竜から、△1三同桂は▲2三飛、また▲1三歩△同桂が、いかんなく発揮されている。穴熊崩しは横からの攻めだけでなく、端を絡めることも重要だ。攻め筋に幅が広がっていることがよくおわかりと思う。"}, {"id": "中級編-001", "no": 1, "chapter": "中級編", "sfen": "ln3g1nl/1r1sgskb1/5p1p1/2p3p1p/pp2p4/2PB1PP1P/PP1SPG1P1/1R4SK1/LN3G1NL b Pp 1", "caption": "問題図は△5五歩まで", "situation": "居飛車対振り飛車の中盤戦。問題図は後手が角交換を拒否して△5五歩と角道を止めたところ。敵陣の弱点を見つけて、リードを奪ってほしい。", "choices": [{"label": "A", "move": "▲8六歩", "expl": "6六角の利きを生かして、8筋からの逆襲をもくろむ。"}, {"label": "B", "move": "▲5六歩", "expl": "後手の金銀はまだ前線に繰り出されていないので、伸び過ぎの5筋を狙う。"}], "correct": "B", "body": "相手が手数をかけて伸ばしてきた歩を負担にさせることができれば、大きな得になる。ここでは5筋の歩と8筋の歩のうち、どちらを目標にするかだ。\n\nA▲8六歩は△同歩なら△8歩として、次に▲8六飛から△8三歩成を狙った手だ。しかし、△5三銀右（失敗図）と上がられて、6六の角がここでは不安定だ。\n\nB▲5六歩が本筋。△8四歩△6五歩△7七桂△8五飛△6六角と進めば、△5五角（成功図）が決まる。やや得な△同歩△6四銀と進めば、中央を奪還して先手ペースだ。"}, {"id": "中級編-002", "no": 2, "chapter": "中級編", "sfen": "ln2k2nl/1r2g1gb1/3ps4/p1p1ppsSp/1p7/P1P2P2P/1PBPP4/2GS3R1/LNK2G1NL b P3p 1", "caption": "問題図は△3四銀まで", "situation": "後手の雁木に対し、先手は棒銀から速攻を仕掛けていった。△2三歩と打たれると局面が収まってしまうので、問題図からも、休むことなく攻めを続けたい。", "choices": [{"label": "A", "move": "▲2三歩", "expl": "2筋は先手のほうが勢力でまさっている。後手の角をいじめる攻め。"}, {"label": "B", "move": "▲3三歩", "expl": "飛車と銀が敵陣を直射しているので、歩で乱して崩していく。"}], "correct": "B", "body": "将棋の手には、①将棋の手に向けて貯金する手と、②貯金を崩して利益を確定させる手の二つがある。\n\nA▲2三歩は4二の銀が安定し、いつか2二に駒を打ち込む手が将来の楽しみとなる。しかし問題は、そのような将来が来る保証がないことだ。\n\n2二に打ち込む駒はなかなか手に入らない。そうなると、ここは△の歩を二重に止める負担という方針で、より、▲3三歩三歩で先手が指せる。△同歩なら△同銀成△同角△2一同銀（正解図）で竜を作って今度は▲2三歩に△3一金（正解図）で確定させ、辛抱で竜を作って攻め筋を確定させ、△銀不成も先手が指せる。"}, {"id": "中級編-003", "no": 3, "chapter": "中級編", "sfen": "ln6l/1r1s2kbl/p1pp1g1pp/4ppp2/9/2P6/PP1PPPP2/1BGS3R1/LN2KG1N1 b GN2s3p 1", "caption": "問題図は△3二同玉まで", "situation": "先手が棒銀から速攻を仕掛けた局面。後手陣は1筋の香がダブって愚形。先手がポイントを挙げている。ここで攻撃を続行するか、陣形を整備するか考えてほしい。", "choices": [{"label": "A", "move": "▲1五桂", "expl": "後手陣が整っていない今がチャンス。一気に攻めていく。"}, {"label": "B", "move": "▲6九玉", "expl": "居玉は避けておきたい。玉を囲ってから次の攻撃態勢を考える。"}], "correct": "A", "body": "有利に進めているときの考え方は、すぐにリードを広げていく、それともボイントを挙げ広げ、じわじわと差をつけていく、どちらか。\n\n問題図の後手陣は1筋の香がひどい形。先手はこの駒が働かないに仕事をしたい。A▲1五桂（正解図）が倍手の好手で、△2四銀なら△同飛△同歩を△2三銀で攻めが続く。\n\nまた、△1五桂に△1四銀も2三桂成△同銀のあとに2三歩成と着手があり、4六歩△5八銀△5八歩△6三銀の要領で攻めが続く。問題図からはB▲6九玉も広い好手だが、△1六歩（失敗図）と進むと先手忙しい。こうなると1筋の香の顔も立つ。後手の駒が働かないうちに、局面を動かしたかった。"}, {"id": "中級編-004", "no": 4, "chapter": "中級編", "sfen": "ln4knl/3r1gg2/4psb2/p3s1ppp/1p7/P1PPSpPBP/1PSGP1N2/1KG4R1/LN6L b P3p 1", "caption": "問題図は△4六歩まで", "situation": "矢倉対雁木の中盤戦。取られそうな歩を伸ばしながら、と金作りを視野に入れた△4六歩は手筋の一着。先手は手番を生かして、攻めていきたい。", "choices": [{"label": "A", "move": "▲4五銀", "expl": "△4七歩成も厳しいが、4筋からの攻めも強烈なので猛攻を仕掛けていく。"}, {"label": "B", "move": "▲4八飛", "expl": "銀をぶつける前に、飛車を回って力をためつつ、と金作りに備えた。"}], "correct": "A", "body": "先手は自玉が堅いので、主導権を握って攻めていきたい。後手陣は△5一銀のキズを抱えている。銀交換を狙った攻め筋で組み立てたい。\n\nA▲4五銀（正解図）が前進策。△同銀なら△4四銀△五一銀で攻めが続くので、先手好調だ。\n\n今の手順中、▲4五銀にも△4七歩成も、四歩△二歩△二銀の四歩△三五銀△二歩△二銀の四四五銀（正解図）と強く△二歩△三銀△二歩△二銀のあと、ここはB▲4八飛も歩を△二銀の後辺で△二四歩△二歩△二歩△二銀の四五銀（変化図）と進むも、難しい形勢だ。"}, {"id": "中級編-005", "no": 5, "chapter": "中級編", "sfen": "l1kg3nl/2s1gr3/4p1bpp/p1p1s1p2/1n1p1p1P1/P1P1P4/1S1PSPP1P/LKG1G2R1/1N2B2NL b Pp 1", "caption": "問題図は△4五歩まで", "situation": "四間飛車に対し、居飛車が銀冠から穴熊に組み替えようとする作戦。後手は穴熊に組まれる前に戦いを起こしてきた。△4五歩の王手に対し、どのように対処するところだろう。", "choices": [{"label": "A", "move": "▲7九玉", "expl": "8五の桂を負担にする指し方。△9九角成は空成りなので、怖くない。"}, {"label": "B", "move": "▲7七桂", "expl": "桂を跳ねて王手を防ぐ。先手は桂を持てば、▲6四桂が楽しみとなる。"}], "correct": "A", "body": "振り飛車が少し早い段階で仕掛けてきた。こちらから居飛車が穴熊に組むのは難しいが、うまくいけば桂をタダ取りできる。\n\nA▲7九玉が軽いの受け。△9九角成と角を成られていても、あらかじめを逃げているので被害は少ない。▲8六歩（正解図）で桂を取りにいって先手指せる。\n\n今の手順中、△9九角成の代わりに△8五歩△同角△同銀（変化図）と桂得を主張する展開も、6歩は歩得を主張する展開で、▲同桂△同桂成△6六角△8七歩成と進む。同同△8二飛△8三歩を△6二金で一局、相手の遅い仕掛けに対し、軽手でとめにいくのが好判断となる。"}, {"id": "中級編-006", "no": 6, "chapter": "中級編", "sfen": "l4k1nl/1r4g2/2np1gbp1/p1ps1ps1p/1p2p2P1/P1PP3SP/1PBSPP3/2G1G1R2/LN1K3NL b Pp 1", "caption": "問題図は△4三金右まで", "situation": "相雁木の戦型から、棒銀で3筋から仕掛けて局面が動き出した。先手は袖飛車にして、なおも攻撃を続けていく構えだが、ここからの構想を考えてほしい。", "choices": [{"label": "A", "move": "▲3五銀", "expl": "棒銀は銀交換が一つの狙い筋なので、銀をぶつけて攻めを続ける。"}, {"label": "B", "move": "▲4六歩", "expl": "銀をぶつける筋を含みにしながら、次に▲3五歩で銀を捕獲する筋をみせた。"}], "correct": "B", "body": "棒銀と袖飛車を組み合わせた攻撃法は、雁木の戦型に限らず頻出するので、手筋などをよく覚えておきたい。\n\n勢いよくA▲3五銀とぶつけると、△同銀▲同飛△3六飛（変化図）がほぼ一本道の手順。駒の損得もなく、これは互角でこちらの将棋だろう。\n\nB▲4六歩が落ち着いた一着、銀の退路を作る△5四金の瞬間に、▲3五銀がタダとなる。△3五歩なら△3五同銀△同銀▲同飛（成功図）と進めば、変化図と比べると先手の一歩先、4五金の交換でも、4五金の交換でも、4三歩を許すわけにいかない作戦成功は明らかだ。"}, {"id": "中級編-007", "no": 7, "chapter": "中級編", "sfen": "lr2g1gnl/5skb1/2n1sp1p1/p3p1p1p/2P6/PPpSPPP1P/5G1P1/1B1R2SK1/LN3G1NL b 3P 1", "caption": "問題図は△8一飛まで", "situation": "四間飛車に対し、居飛車はエルモ囲いから急戦を仕掛けた展開。問題図は後手が6一の飛車を回って8筋を狙ったところ。振り飛車らしく対処してほしい。", "choices": [{"label": "A", "move": "▲6七飛", "expl": "飛車を浮き、△8六飛に対し、▲8七歩を用意して8筋を受ける。"}, {"label": "B", "move": "▲7四歩", "expl": "8筋を破られても、▲7三歩成からの、と金作りがまさると判断。"}], "correct": "B", "body": "居飛車の急戦に対し振り飛車は、美濃囲いの堅さを生かしたさばきが肝要。盤面全体を見渡した大局観が望まれる。\n\nA▲6七飛は△8六歩△8四同飛と進めば、5八歩ぐらいで五角の形勢。しかし、今の手順中、▲8七飛に△8七歩成（失敗図）が軽手で振り飛車まずい。飛車の取り合いは先手忙しい。\n\nここはB▲7四歩と進めたい。以下△8六歩△同歩△6七同桂と着き、▲7三歩成で、銀損が、▲7一同竜の手段で銀損を取り戻している。これで6四角や△2七飛△同銀引（正解図）まで、また飛車の存在と桂得を補い、6四角や△6七飛△同銀引（正解図）まで、振り飛車が指せる。"}, {"id": "中級編-008", "no": 8, "chapter": "中級編", "sfen": "ln2s1gkl/1r4gs1/3p1pnp1/p1p1pbp1p/1p7/P1PPPP2P/1PBS2PP1/2G3SK1/LN2RG1NL b - 1", "caption": "問題図は△5一銀まで", "situation": "居飛車がミレニアム囲いをさらに固めようと、6二の銀を引いたところ。振り飛車は四間飛車から中飛車に振り直し、バランスで対抗する作戦。ここでの大局観は？", "choices": [{"label": "A", "move": "▲6五歩", "expl": "振り飛車は7八金型なので角交換後、8筋の歩を交換されても飛車を追い返せる。"}, {"label": "B", "move": "▲4七銀", "expl": "この陣形はツノ銀に組み替えるのが形なので、じっくりと指す方針。"}], "correct": "A", "body": "後手は金銀4枚で固められるが、先手はこれ以上、手数をかけても玉が堅くならない。バランスで勝負するつもりだ。\n\nA▲6五歩と角交換を狙うつもり。▲7七同桂（正解図）と進めて、後手は△一銀が中途半端な形。先手は▲5五歩△同歩同飛が約束されている。\n\nここはB▲4七銀でこれからの将棋となる。後手陣は駒が偏っているので、手余り偏った好着で先手に。じわじわとポイントを重ねていく方針だ。"}, {"id": "中級編-009", "no": 9, "chapter": "中級編", "sfen": "ln1g2g1l/5sk2/ppp1ppnp1/6p1p/2P6/P2r4P/1P2PPPP1/2R1G1SK1/LN3G1NL b BSPbsp 1", "caption": "問題図は△6六同飛まで", "situation": "三間飛車に対し、居飛車は腰掛け銀から右四間飛車にして速攻を仕掛けてきた。問題図は6筋で銀交換が行われたところ。振り飛車らしいさばきのセンスが問われる。", "choices": [{"label": "A", "move": "▲6八飛", "expl": "飛車をぶつけていく。飛車交換は美濃囲いの堅さが生きる展開だ。"}, {"label": "B", "move": "▲5六角", "expl": "攻防の角打ち。△6九飛成としてきたら、そこで▲6八飛と応じる。"}], "correct": "B", "body": "将棋は対戦相手と交互に指す競技だ。従って、相手の指し手より、少しでも価値の高い一手を選びたい。\n\nA▲6八飛は振り飛車らしい手で、同飛成成（変化図）と進む。以下▲7九飛△6八同銀▲6八金が利けばよいが、△一銀▲6九金、△6四九銀成と攻められる。\n\nB▲5六六角が八方にらみの自陣角、△6九銀の割打ちに△6九飛成も空振り。5六角に△2四同歩△6九飛成も空振り。同金（正解図）と進めば、変化図と比べて5同金、ぎりぎり、6四角△6九飛成△5二桂で五五歩△2四歩△一銀引△一同竜と進めて、手陣の一手をゼロ手で指せている、後手の△6九飛成も無駄な手にさせていることを確認してほしい。"}, {"id": "中級編-010", "no": 10, "chapter": "中級編", "sfen": "l2gkg1nl/3s5/p2pppspp/2p3p2/3n3P1/1GP6/P2PPPP1P/1s1K2SR1/LN3G1NL b RB2Pb 1", "caption": "問題図は△8八銀まで", "situation": "角換わり将棋の出だしから、後手がいきなり桂を跳ねて速攻を仕掛けてきた展開。飛車も切り飛ばす猛攻で、もう後には引けない。この局面で先手の方針を問う。", "choices": [{"label": "A", "move": "▲6六歩", "expl": "△8九銀不成〜△7七角が王手金取りになるので、6五の桂に働きかける。"}, {"label": "B", "move": "▲8一飛", "expl": "攻防手。8筋の受けに利かせつつ、▲8三角や▲9一飛成などの含みもある。"}], "correct": "A", "body": "後手の攻めはやや無理気味だが、応接を誤ると、いっぺんに負けてしまうのは先手だ。相手の狙いを看破して対処したい。\n\n△7九角成の狙いがあり、A▲6六歩が強気な受け、▲7九角△8八銀成△5九金（正解図）で、後手の攻めは切れ筋となる。\n\nB▲8一飛は攻め合いを視野に入れた手だが、△8九銀成（失敗図）で先手まずい。8一飛成△8九成銀▲5八飛で五取り、6五の桂が急所の位置で、7と五七、2の地点によく利いている。このような駒は、早く取り除くことが賢明だ。"}, {"id": "中級編-011", "no": 11, "chapter": "中級編", "sfen": "ln1gr4/1ks3g1l/1ppp1pbp1/p4sp1p/4p4/P1PS1SP1P/1P1PPP3/1BK1G4/LN1G3RL b NPn 1", "caption": "問題図は△2三歩まで", "situation": "ゴキゲン中飛車の定跡形から、居飛車が動きを見せて中盤に入ったところ。△5四桂と、銀の両取りが見えているが、先手はどのような方針で指すところだろう。", "choices": [{"label": "A", "move": "▲1五歩", "expl": "1二香型をとがめる動き。△1五同歩なら▲1三歩〜▲2五桂と攻めていく。"}, {"label": "B", "move": "▲3九飛", "expl": "▲3五歩△同歩▲同銀を見せて、揺さぶりをかけていく。"}], "correct": "B", "body": "有利に進めるため、遊び駒を作らない、という考えがある。逆に言うと、相手の駒に働きかけるのは、よくないということだ。\n\nA▲1五歩は△同歩△1三歩△2五歩△2四桂△2四桂△2四桂（失敗図）で振り飛車にさばかれている。\n\nB▲3九飛がこの局面では1足跡となっている。一着、以下△5四桂△5四桂△5四桂△4六同銀（正解図）と進めば、先手は銀夜換の駒組みをしながら、後手が歩切れなので互角の分かれだ。"}, {"id": "中級編-012", "no": 12, "chapter": "中級編", "sfen": "ln1g3nl/1ks2r1g1/1pp5p/p2p1pp2/9/P1PS2P2/1P1P1PN1P/1BK1G4/LN1G4L b BS2Prs2p 1", "caption": "問題図は△4四同歩まで", "situation": "居飛車対振り飛車の対抗形から戦いが始まり、飛車角交換が行われている。中盤から終盤に入るところ。駒の損得はなく、ここからの指し方が大事となる。", "choices": [{"label": "A", "move": "▲3一銀", "expl": "飛車金両取りの割り打ち。この形における手筋だ。"}, {"label": "B", "move": "▲5四歩", "expl": "5筋に歩を垂らして、と金作りを見せる。△5二歩なら大きな利かしとなる。"}], "correct": "B", "body": "前間に続いて、遊び駒がテーマの問題だ。駒の損得がないということは、1枚1枚の効率が最重要になる。\n\nA▲3一銀と飛び込みたくなるが、△2三飛△2二銀成△同飛（失敗図）と進むと、飛車の成り込みが厳しい。2二の金は遊び駒だったのに、持ち駒の銀にしてしまい大きな損だ。\n\nB▲5四歩（正解図）と垂らすのが味のよい手。この攻め取りは先手の得、と金作りを防げる。△5二歩なら△4四歩、△3一金、△5七歩などの手が消えているも先手の得。"}, {"id": "中級編-013", "no": 13, "chapter": "中級編", "sfen": "l4g1nl/1r4kb1/3g1p1p1/p1pppsp1p/9/P1PS1B2P/1P1P1PPP1/2G3SK1/L3RG1NL b SP2np 1", "caption": "問題図は△6三金まで", "situation": "ゴキゲン中飛車対二枚銀の戦いから問題図のように進んだ。銀桂交換の駒得で先手まずまずの展開。ここからも攻めを続けていくが、どこに目を向けるか。", "choices": [{"label": "A", "move": "▲6五銀", "expl": "角筋に入っている飛車を狙う。露骨な手だが、破壊力がある。"}, {"label": "B", "move": "▲5五歩", "expl": "歩を合わせるのが自然な攻め。以下は角と銀の交換が狙いとなる。"}], "correct": "B", "body": "将棋には直接的な攻めと間接的な攻めがあり、受け止められやすい。直接手は遠回りのものでも、受け止められやすい。直接手は遠回りのものもある。\n\nA▲6五銀は止められない。直接手は遠回りがあるもの、受け止められやすい。直接手は逆効果がある。△6五同歩△8二／飛車を取れる飛車を取れる、△6五同歩△6八角とされ、△5五同角（失敗図）で先手大変。この変化は攻めの継続が難しい。\n\nここはじっくり攻めたい。B▲5五歩（正解図）が好手。△同銀とこれからの将棋がさばけば、持ち駒も豊富、なので先手は満足な分かれ。直接的な攻めがうまくいかないときは、遠回りでもゆっくりと攻めていきたい。"}, {"id": "中級編-014", "no": 14, "chapter": "中級編", "sfen": "lr6l/3g2gk1/2n1ppnp1/p3ss2p/2pP1Np2/P1PSSP2P/1P2P4/1KG2G3/LN5RL b BPb3p 1", "caption": "問題図は△3三同桂まで", "situation": "角換わり腰掛け銀の流行形から、激しい攻め合いとなった。▲3三歩とたたいて△同桂と取った局面。先手は先に攻勢を取っており、相手に攻めのターンを与えず迫っていきたい。", "choices": [{"label": "A", "move": "▲3四歩", "expl": "すぐに清算せず、相手から桂を取ってもらうのが良策。"}, {"label": "B", "move": "▲3三同桂成", "expl": "平凡に応じておく。攻めの桂と守りの桂の交換は、攻め側が有利だ。"}], "correct": "A", "body": "角換わり腰掛け銀の特徴は、角を手持ちにしているため攻撃に破壊力があること、先攻して、一方的に攻めに持ち込めれば、一気の寄せも狙える。\n\nA▲3四歩が厳しい好手だ。後手は△4五桂と桂を取るよりなく、△同銀▲同銀右▲同銀（成功図）が一本道の進行。\n\nB▲3三同桂成は自然だが、△同銀（失敗図）難しいところはあるものの、後手玉を薄くして先手のペースで攻める手がある。少しぬるいと感じて、後手から△7六歩や△4四角などの攻めが厳しい、相手に手を与えない、一気の攻めを習得してほしい。"}, {"id": "中級編-015", "no": 15, "chapter": "中級編", "sfen": "1n5nl/r5gk1/7p1/3+Bpgpsp/1p7/l1PPP1P1P/NPS3S2/PKGG3R1/4+b2NL b S2Pl4p 1", "caption": "問題図は△4四同金まで", "situation": "相矢倉の戦いで、中盤の難しい局面を迎えている。先手は銀香交換の駒得だが、9筋に嫌味をつけられているのが難点だ。5九馬の存在も不気味で、攻めと受け、いずれを選ぶか。", "choices": [{"label": "A", "move": "▲5三銀", "expl": "金を上ずらせ、形を乱したところを続けて攻めていく。"}, {"label": "B", "move": "▲4八銀", "expl": "先手玉は挟撃態勢を築かれている。後手は駒不足なので、今のうちに馬を始末しておく。"}], "correct": "B", "body": "自分の指したい手と相手の狙い筋を比較して、こちらの指し手のほうが、価値が高ければそれを選べばよい。\n\nA▲5三銀は、以下△4三金▲三金寄△2四馬と進めると、▲4四馬の効きが9筋から三角寄。以下△2四馬と進めると、先手は馬の利きが9筋からそれると、飛車と香のミサイルがさく裂する。\n\nここはB▲4八銀と馬を責めるのがよい。以下△2七香▲5八銀（正解図）で捕獲できる、▲4九銀から△2八香成、この変化は先手の駒得が生きる。攻める前に、長期戦に持ち込めば駒得が生きる。攻める前に、自陣の憂いをなくしておく感覚が大切だ。"}, {"id": "中級編-016", "no": 16, "chapter": "中級編", "sfen": "l6nl/1r1g1kg2/4p1s1p/p1ppsp1p1/1n4S2/P1P6/2SPPP2P/2GG3R1/LNK4NL b B3Pb2p 1", "caption": "問題図は△8五同桂まで", "situation": "角換わり将棋の中盤戦。先手が早繰り銀から仕掛けたときに、後手も継ぎ歩で反撃する展開。銀取りに対して、先手はどのように応対すればよいだろうか。", "choices": [{"label": "A", "move": "▲8六歩", "expl": "銀を逃げるのは後手の攻めを助長してしまう。ここは銀桂交換に甘んじておく。"}, {"label": "B", "move": "▲8八銀", "expl": "攻めてこられるのは怖いが、▲8六歩を楽しみに辛抱する。"}], "correct": "B", "body": "受けに回るのは怖いが、恐れてばかりでもいけない。A▲8六歩は銀桂交換だから、ひとまず8筋を無難に受け止めておく対し方。\n\n▲7七桂成（失敗図）の筋に取り方が難しい。▲同金右▲8六同桂は▲3九角の筋が残る。同金右▲同桂飛、▲8七歩は飛、また、△8七歩が嫌味だ。\n\n7筋や9筋の歩の突き捨てが入っていないので、B▲8八銀（正解図）と応じる。後手は△8四歩、▲9七角△8六歩△同桂△6四桂と取り返して4六桂を必要以上に恐れないことだ。"}, {"id": "中級編-017", "no": 17, "chapter": "中級編", "sfen": "lnkg4l/2s1g4/1ppp1sn2/p3ppp1p/1P1S3r1/P1RP4P/LbN1PPPP1/4GGKS1/7NL b B2P 1", "caption": "問題図は△8七角まで", "situation": "相振り飛車の戦い。後手は一歩損を甘受して、角交換から△8七角と飛車取りに打ち込んできたところ。飛車を逃げるか、それとも他に手段を求めるか。", "choices": [{"label": "A", "move": "▲8六飛", "expl": "飛車を取られて打ち込まれると、竜で暴れられるので逃げておく。"}, {"label": "B", "move": "▲3一角", "expl": "飛車は取られても馬を自陣に成り返り、手厚い陣形を作る。"}], "correct": "B", "body": "先手は飛車取りになっているが、次は△7六角成でなく、△6四角と銀と銀がタダになると、銀を逃げる手はがタダなる、銀を逃げると、車のタダがなる。\n\nA▲8六飛は目前の飛車取りに突かれると困る。△6四角△6八角成（失敗図）と先手だが、▲8七角や、▲5九角では受けにくい。\n\nB▲3一角馬だ。この解答図は最善の頑張りで、▲6四歩を△同同角成と進めても、まずいが、△6五歩△6三歩△6四桂はうまくいかない、▲5四角がうまく切り返しになる。3一角に△7六角成▲8六飛△7九飛、ここからの将棋、局面のバランスを保つ角打ちが急所だった。"}, {"id": "中級編-018", "no": 18, "chapter": "中級編", "sfen": "ln2k2nl/1r2g1g2/p2p1sbpp/2ps1p3/1p2p1SP1/2P2P3/PPBPP3P/2S1G1R2/LNKG3NL b Pp 1", "caption": "問題図は△5二金まで", "situation": "後手の雁木に対して、先手が袖飛車から仕掛けていった中盤戦。3八の飛車と3五銀の形がよいので3筋は制圧できそうだが、後々のことも考えて攻めを繰り出したい。", "choices": [{"label": "A", "move": "▲3四歩", "expl": "四段目に歩を打ち、この地点を押さえておくのがポイントだ。"}, {"label": "B", "move": "▲4五歩", "expl": "3筋は先手が優位に立っているので、4筋も絡めて攻めの幅を広げる。"}], "correct": "B", "body": "中盤戦の進め方は、じっくり攻めるときと、攻めを継続するときとに分かれる。ゆっくり指していると、相手の陣形も整ってくる。\n\nA▲3四歩は前者の考え方で、▲3六桂△5二金▲5四金（失敗図）と進む。後手に中央を固められて、いずれ△7五歩〜△同銀がやってくる。\n\nここはB▲4五歩（正解図）と攻めを継続させたい。対して同歩には▲4四歩で先手よし。△4五同歩、△4四歩、△4五同銀引△4四金、もう4筋の先攻にすぐで、4筋も絡めるね、△2三金を△3一銀左、後手も△4四同歩の踏み込み、問題図から穏やかな流れにせず、後手に立ち直りを与えないことがポイントだった。"}, {"id": "中級編-019", "no": 19, "chapter": "中級編", "sfen": "l6kl/1r3bgs1/2np1g1pp/1sp1ppp2/pp6P/2PPPBPS1/PPSG1P3/1KG6/LN5RL b NPn 1", "caption": "問題図は△9五歩まで", "situation": "相矢倉の中盤戦。先手の棒銀に対し、後手は菊水矢倉で対応する展開。2筋で桂交換が行われ、先手は次の攻めを考えたい局面。どこに目を向けるか。", "choices": [{"label": "A", "move": "▲6五桂", "expl": "持ち駒の桂を生かした攻め筋。先手の角筋に入っている飛車に狙いを付ける。"}, {"label": "B", "move": "▲3五歩", "expl": "桂がいない囲いはもろいので、手薄な3筋から攻めていく。"}], "correct": "B", "body": "相居飛車の将棋は、縦から囲いを崩し合う展開となるため、主導権を握って先攻することが大切だ。\n\nA▲6五桂は角筋を生かすためだが、本筋ではない。△6四歩△同角△7三成△同銀（失敗図）と進むと、△3八桂〜△4七角成銀（失敗図）と進むと、△8六歩△9四桂の筋が気になる。\n\nB▲3五歩（正解図）が急所を突いた攻め。△同歩△同銀と引いて、次の3三を狙うか3一二六銀から、△三五歩は△3四歩△2四同歩△3一を△2三歩、△3一銀△3一にに攻め込めるの勢いがある、いずれも先に攻めを続けられるので先手が指せている。"}, {"id": "中級編-020", "no": 20, "chapter": "中級編", "sfen": "ln1gr3l/1ks3g2/1ppp3pp/p4pp2/4sn3/P1PP1S3/1P1S1PP1P/2KGG2R1/LN5NL b B2Pbp 1", "caption": "問題図は△5五同銀まで", "situation": "中飛車に対し、先手は中央に金銀を集めて手厚い陣形で対抗した。後手は銀を繰り出して中央を狙った動きを見せる。素直に銀交換するか、それとも他の手段か。", "choices": [{"label": "A", "move": "▲5五同銀", "expl": "銀交換に応じる。4六の銀が盤上から消えると、▲4六歩の桂取りが楽しみだ。"}, {"label": "B", "move": "▲5二歩", "expl": "銀交換は相手の思惑通りなので、変化球でかわして受ける。"}], "correct": "B", "body": "駒がぶつかり、激しい戦いに入る前は重要だ。後戻りできない場合もあるので、慎重に対処したい。相手の狙い通りに進んでも、その局面でこちらが有利であるならよいが、A▲5五同銀は△同銀▲5五歩△5七歩（失敗図）で、かなりパンチを浴びることを覚悟しないといけない。\n\n4六歩△5七歩、5七歩までで、（失敗図）銀交換は後手の言いなりなので、狙いをかわす手段があるところで、B▲5二歩しい。\n\n△同飛▲4一角（正解図）と応じたい。△4二銀△4一飛、△5三角成△同飛、また△4六歩、△5三飛△5五銀と進めば、いずれも先手が指せる技だ。"}, {"id": "中級編-021", "no": 21, "chapter": "中級編", "sfen": "+R4g1nl/4g1ks1/2np1p1p1/p2sp1p1p/3l5/PP1R1P2P/2N1P1PP1/2P1G1SK1/+b4G1NL b SLPb2p 1", "caption": "問題図は△6五香まで", "situation": "振り飛車対居飛車の戦いから、後手が急戦を仕掛けて終盤戦の入口あたりの局面。△6五香と打たれて飛車は助からないが、どのような取られ方が望ましいか。", "choices": [{"label": "A", "move": "▲5六飛", "expl": "いったん飛車を逃げておく。取られ方と、取られる場所を工夫する。"}, {"label": "B", "move": "▲6五同桂", "expl": "飛車を取られるにしても、タダで取られるより、香と交換したほうが得だ。"}], "correct": "A", "body": "中・終盤では駒の損得より、駒の働きが重要となるケースが多い。自分に相手の駒が働かないようにすることも大切だし、逆に相手の駒が働かないようにすることも大切だ。\n\nA▲5六飛と逃げるが△5五歩▲7六飛△7五歩で捕まる、そこで▲5四香（正解図）が厳しい一着となる。\n\nB▲6五同桂は△6六馬△同銀（失敗図）と進ると、相手の駒が動かないように組み立てがまずい。9九の馬を働かさせたことがまずい。先手は角香交換の駒損だし、9九の馬を働かさせたことがまずい。先手は角香交換の駒損だし、馬が働かない、馬と比べてほしい。"}, {"id": "中級編-022", "no": 22, "chapter": "中級編", "sfen": "ln6l/2kg3r1/1p1spsn1p/p1pp1p3/6gpP/P1P6/1PSPPPS2/1KGG3R1/LN5NL b B2Pbp 1", "caption": "問題図は△3五同金まで", "situation": "後手が阪田流向かい飛車にして、持久戦模様となった中盤戦。△3五歩▲同歩△同金と3筋の歩を交換した局面。自然な指し手は▲3六歩だが、相手の動きを逆用したいところだ。", "choices": [{"label": "A", "move": "▲1四歩", "expl": "「離れ駒に手あり」。1筋を詰めたことを生かして動いていく。"}, {"label": "B", "move": "▲2四歩", "expl": "二段目の飛車を移動させ、隙を作って攻めを狙う。"}], "correct": "A", "body": "駒組みが完了して、中盤に入り仕掛けのタイミングをうかがうこういう時期は、技は相手がじっとしているとかかりにくい場合があるが、動いきたところに隙が生まれることもある。\n\nA▲1四歩と動いていく。次は▲三角の継続手、▲一歩成、次は一気に攻め筋（正解図）が続く。1四同香（正解図）の飛車金両取りがある。\n\n従ってB▲1四歩には△同香と取らねば▲1三角がある、▲2四歩（正解図）で先手よし。1三角ならはり▲3角ゆうり▲4角△5二金（失敗図）で先手が忙しい。端の位を生かし、1筋を上ずらせれば1四角があるところに着目してほしい。"}, {"id": "中級編-023", "no": 23, "chapter": "中級編", "sfen": "ln1gb2nl/1ks1g2r1/1pp1p4/p2p1Sspp/6p2/P1P1P3P/1P1P1P3/1BKS3R1/LNG1G2NL b 3p 1", "caption": "問題図は△5一角まで", "situation": "居飛車が急戦を仕掛け、銀をどんどん前進して攻めが成功している。先手の角筋に後手の飛車が入っているので、それを見越した継続手を考えたい。", "choices": [{"label": "A", "move": "▲5三銀成", "expl": "歩を取りながら銀を敵陣に侵入。そして、角で飛車を狙った攻め方。"}, {"label": "B", "move": "▲4三銀不成", "expl": "銀を不成で入れば金銀の両取り。加えて角で飛車取りにもなっている。"}], "correct": "B", "body": "4四の銀を動かせば飛車取りになる。問題はどこに移動させるか、一番得な指し方を判断したい。\n\nA▲5三銀成は気持ちのいい手だが、△3三角と受けられる。以下▲4二角成△同桂▲5二成銀△同飛△銀▲5二同飛（変化図）と進すと、あまり戦果が挙がっていない。\n\nここはもっと欲張りたい。B▲4三銀不成（正解図）がベストで、飛車取りを防ぎつつ、四銀成で駒得となる。なお、問題図は▲5五銀（変化図）と気を逃すなら、飛車を逃げなり香銀の駒得となる。なお、問題図は▲5五銀と気を逃すなら、飛車を逃げなり香銀の駒得となる。"}, {"id": "中級編-024", "no": 24, "chapter": "中級編", "sfen": "ln1B3nl/1r4gk1/3s1gs1p/p2ppppp1/1p6S/P1PPP3P/1PSG1PN2/1KG4R1/LN6L b Pb2p 1", "caption": "問題図は△2四同歩まで", "situation": "相矢倉の戦い。先手が棒銀で先攻する展開。後手は攻めの態勢が取れていないので、立ち遅れている感じ。先手は6一の角と、2筋からの攻めでリードを広げたい。", "choices": [{"label": "A", "move": "▲2四同銀", "expl": "素直に銀を交換しておく。攻めの銀と守りの銀なので攻め側が有利。"}, {"label": "B", "move": "▲2五歩", "expl": "継ぎ歩攻めで矢倉囲いを攻略。桂が攻めに参加するので効果的だ。"}], "correct": "B", "body": "攻めは飛車角銀桂で、先手は理想的な展開となっていく。問題図から、どのように攻めを続けていくか。\n\nA▲2四同銀は自然な手だが、△同飛、△2三歩△2八飛△5二銀打（失敗図）と進み、角銀交換の駒損となり先手難局。後手陣すっきりしてしまう。\n\n単純な銀交換ではうまくいかないので、先手は工夫が必要だ。力をためる、B▲2五歩（正解図）が厳しい。△同桂は▲三三桂成、▲同金が三歩、△同金、▲2四歩で攻めが続く形だ。▲2五歩に対し△2四歩との同金角成△同飛、▲2四歩で攻め2四歩が厳しく、やはり先手優勢となる。"}, {"id": "中級編-025", "no": 25, "chapter": "中級編", "sfen": "ln5nk/1r4gsl/3ppg1p1/2ps1pp1p/pp2P4/2PS2P1P/PP1P1P1P1/6RSL/LN3GGNK b Bb 1", "caption": "問題図は△9五同歩まで", "situation": "ゴキゲン中飛車の出だしから、相穴熊と進んだ中盤戦。後手が△9五角とぶつけて角交換となったところ。次は△8六歩〜△同飛が見える。振り飛車らしく対応してほしい。", "choices": [{"label": "A", "move": "▲7七桂", "expl": "先に桂を逃げながら活用。8筋を破らせてもカウンターで切り返す。"}, {"label": "B", "move": "▲8八飛", "expl": "△8六歩〜△同飛と突破されるとまずいので、飛車を回って受けておく。"}], "correct": "A", "body": "振り飛車のさばきは、相手の攻めを呼び込んで反撃する要領だ。動けば動かれるの極意で、動いたときに隙が生じる。\n\nA▲7七桂は、▲8六歩△6三銀▲6四歩、▲4一角（成功図）が用意の切り返し。以下△6四飛△6三角成△同金（成功図）の進行で、6四の銀がお荷物となるので振り飛車が指せる。\n\n今の手順中、△8六同飛では▲8七歩だろうが、▲8五飛、それからの将棋だが、△7九角▲7八角▲4八飛、△2四角成（失敗図）と進ると、4五桂▲5四桂で振り飛車苦戦となる。後手は馬の存在が手厚い。△2七二金型で先手が金を消してから、後手二角の筋が狙いとして残るため居飛車が十分だ。"}, {"id": "中級編-026", "no": 26, "chapter": "中級編", "sfen": "l3g1g1l/3r1sk2/1+Pp1ppnp1/p5p1p/3s5/PR+bpPPP1P/N3S2P1/3PG1SK1/5G1NL b BNPlp 1", "caption": "問題図は△7六馬まで", "situation": "後手は腰掛け銀から右四間飛車にして、エルモ囲いから急戦を仕掛けてきた展開。飛車取りになっており、駒が当たりになっているときこそ、冷静な対応が要求される。", "choices": [{"label": "A", "move": "▲7六同飛", "expl": "馬と飛車の交換なので悪くない。後は、と金を活用して勝負。"}, {"label": "B", "move": "▲7三と", "expl": "飛車取りに対し放置して、と金の活用を急いだほうが得策との読み。"}], "correct": "B", "body": "飛車取りになっているので飛車を逃げるか、それとも他の手段で応じるか、しっかりと考えたい。\n\nA▲7六同飛は馬と角の交換で、それから他の終盤戦だ。しかし、この手順は、と金がややぬけている。\n\nここはB▲7三とで切り合いたい。対して6四飛と逃げるのが先手よし。6四飛△2三と△2三と先手に。8二飛（成功図）が馬金両取りで、先手やはり6三と▲4一金△6二飛、5二と6三と先手有利。手が指せる。今の手順中、後手は△6三同金で、4二二飛△6三飛が△6二飛△8二飛（成功図）が馬金両取りで、5二に金右を逃げることになるが、▲7一飛がー二飛と逃げると先手厳しく先手優勢となる。"}, {"id": "中級編-027", "no": 27, "chapter": "中級編", "sfen": "ln6l/1r4gk1/3psgns1/p1p2pppp/bp7/2P1SPP1P/PPBP3P1/5RGSL/LN4GNK b Pp 1", "caption": "問題図は△9五角まで", "situation": "先手が▲9六歩と突く手を省いたので、後手は△9五角とぶつけてきた。通常、角交換は居飛車有利だが、先手は振り飛車穴熊の堅さを生かして、強く戦いたい。", "choices": [{"label": "A", "move": "▲4五歩", "expl": "現状は先手の角筋が通っているし、飛車と銀に活を入れる攻め。"}, {"label": "B", "move": "▲5五角", "expl": "飛車取りに角を出て、ひとまず角交換を避けておく。"}], "correct": "A", "body": "次に▲7七同桂、▲8六歩△同歩、と突破されたら、悪いことばかりではない。この後を活用できる。\n\nA▲4五歩が仕掛けの第一歩、△同銀▲4五歩△5四歩△同銀▲4四銀（成功図）と進めば、先手の攻めが続く。\n\n今の手順中、▲4五歩に代えて▲7七同成、▲5五歩は▲5五同で、やはり先手よし。B▲5五角は▲4五銀（失敗図）で継続手が難しい。▲6四歩に角を上げるようでは先手不利。"}, {"id": "中級編-028", "no": 28, "chapter": "中級編", "sfen": "ln3g1nl/1r3sk2/p1pp1g1p1/1p1sPpp1p/9/2P5P/PPNP1PPP1/3S2SK1/L2GRG1NL b Bbp 1", "caption": "問題図は△4三金まで", "situation": "中飛車から5筋の歩を交換して、積極的に動いていった。▲5四歩と打って攻めたが、この歩が負担になるようでは先手失敗となる。拠点を生かした展開を考えてほしい。", "choices": [{"label": "A", "move": "▲7八金", "expl": "中飛車なので▲5八金左とする形ではない。バランスよく金を配置する。"}, {"label": "B", "move": "▲6六歩", "expl": "6四の銀は歩越し銀。従って、歩で追い返す手順を作っておく。"}], "correct": "B", "body": "四段目の歩は、と金の元なので大事にしたい。授軍を送らないようにと指しすぎになるので注意が必要だ。\n\nA▲7八金は中飛車の好形だが、△5五歩△6六歩△5五金△6四金（失敗図）と歩を取られて一歩損となり、不満。問題図で△8八角と打たれた手の対する、急ぐことはない。\n\nB▲6六歩が正着で、放置すれば▲6五歩が銀を捕獲できる。▲6五歩△7三角成、▲6五歩△7三角成、▲6五歩△7三角成、▲6五歩△7三角成、▲6五歩△7三角成、▲6五歩△7三角成、▲6五歩△7三角成。"}, {"id": "中級編-029", "no": 29, "chapter": "中級編", "sfen": "lnsg1g1nl/1k2r4/1ppp1pbpp/p4sp2/4p2P1/P1PS2P2/1P1PPP2P/1BK1GS1R1/LN1G3NL b - 1", "caption": "問題図は△4四銀まで", "situation": "5筋位取り中飛車に対し、居飛車は急戦で迎え撃つ作戦。通常は右の銀を繰り出してから左の銀を出ていくことが多く、本譜は工夫した手順。この形を生かした構想を考えてほしい。", "choices": [{"label": "A", "move": "▲3七銀", "expl": "超速▲3七銀戦法のように、次に▲4六銀と出て二枚銀で圧力をかけていく作戦。"}, {"label": "B", "move": "▲4六歩", "expl": "「歩越し銀には歩で対抗」。以下は▲3七桂〜▲4五歩を狙いにする。"}], "correct": "B", "body": "ゴキゲン中飛車に対し、居飛車が中央に二枚の銀を配置する作戦は有力とされている。\n\nA▲3七銀以下、△4六銀▲3六銀△3二金▲3七銀以下、△一飛（変化図）が進行の一例。これは互角の展開だろう。この後はタイミングを見計らって、と仕掛けていくことになる。\n\n△4四銀は歩越しの銀なので、B▲4六歩と進めて先手満足だ。指した、△7二飛△5二銀▲5五歩を取って先手満足だ。次は▲5四歩△5二銀▲5五歩を取って先手満足だ。歩から飛車を捕獲する順がある。相手の形に対し、弱点を見抜く力を養ってほしい。"}, {"id": "中級編-030", "no": 30, "chapter": "中級編", "sfen": "l4g1nl/1r3sk2/2n2g1p1/p1ps2p1p/5p3/PPPS4P/2Nb1PPP1/4RGSK1/L4G1NL b B4Pp 1", "caption": "問題図は△6七角まで", "situation": "先手中飛車の戦型。居飛車が4筋の位を張った手に対し、先手は角交換を挑んで戦いとなった。後手が△6七角と飛車取りに打ったが、どのように対処すればよいだろう。", "choices": [{"label": "A", "move": "▲6五歩", "expl": "飛車角交換は歓迎で、飛車取りに構わず反撃していく。"}, {"label": "B", "move": "▲5七飛", "expl": "飛車は大事な駒。取りあえず逃げて、その後のことはそれから考える。"}], "correct": "A", "body": "飛車と角を比べると飛車のほうが使いやすいが、角をうまく活用することができれば上級者といえる。\n\n飛車を逃げにくいA▲6五歩が▲6五歩〜△5三銀引なら、▲5五歩、▲5五成功図）が桂香両取りで、今の手順中、6三同金寄なら△5三銀引が桂香両取り、▲6五歩がよい。\n\nB▲5七飛と逃げると、△7六角成（変化図）で先手まずい。▲5五銀は同銀飛、▲5五銀は△5五歩△6四角成で、再度の△6七馬を防ぐことになるので注意したい。"}, {"id": "中級編-031", "no": 31, "chapter": "中級編", "sfen": "l3k2nl/2+S3g2/2n1p2p1/pr4s1p/1ppp1SpP1/P7P/1PSPPp3/2GK2G2/LN5RL b G2bn3p 1", "caption": "問題図は△3四同銀まで", "situation": "角換わり将棋の終盤戦。先手の仕掛けが成功して有利な展開。後手の玉が不安定なので、この瞬間に決めてしまいたい。寄せ形に持っていく手順は？", "choices": [{"label": "A", "move": "▲3四同銀", "expl": "素直に銀を交換して手駒に加え、金と銀を持って寄せを狙う。"}, {"label": "B", "move": "▲2四歩", "expl": "銀交換を含みにして、2筋の突き捨てが入れば飛車の活用も見込める。"}], "correct": "B", "body": "左翼は7二の成銀が頑張っているので、2〜4筋方面を攻めることが理想。寄せを組み立てたい。先手は挟撃態勢を築くことを念頭に、寄せを組み立てたい。\n\nA▲3四同銀▲4二三▲4五歩△8四歩△8四飛（変化図）が進行の一例。先手やや有利ながら、まだ長そうだ。\n\nB▲2四歩が正しい攻め方。△同歩は同飛、▲4一銀（正解図）で、▲4五歩か4一同銀が続かそう（正解図）で、ぐむわら△2一飛△2三歩成、4三▲5四銀引、寄せ続く。先手は飛車の活用を図り、挟み撃ちで仕留めるのが理想だ。"}, {"id": "中級編-032", "no": 32, "chapter": "中級編", "sfen": "ln1g1g2+P/1ks6/1ppp1pnpp/p3r2b1/9/P1P1psp2/1P1P1S2P/1BKSG1PR1/LN1G3NL b LPp 1", "caption": "問題図は△4六銀まで", "situation": "中飛車に対し、先手が急戦を仕掛けて激しい展開となった。先手は香得しているが、5筋のキズも嫌味だ。駒がぶつかっているときこそ、落ち着いて対処したい。", "choices": [{"label": "A", "move": "▲4六同銀", "expl": "このまま△5七歩成を許してはいけないので、銀を交換しておく。"}, {"label": "B", "move": "▲2四飛", "expl": "飛車を渡すことになるが、根元の角を外して5筋の攻めを緩和する。"}], "correct": "B", "body": "駒が当たりになったときは、取ることから考えるのが基本。しかし、その後の展開ももちろん考えておかないといけない。\n\nA▲4六同銀は△同角△5七銀（変化図）で先手大変、今の手順中、△5七銀（変化図）で先手大変、3七歩成で無効だ。\n\nズバッとB▲2四飛がよい、△同飛（4八歩成）と△2四飛が侵入できるが、以下△3三成△4九成△5八成△5九成成、この後手の二枚成が相当だが、▲4三角桂と攻めて先手が指せる。先手の二枚成に△6三飛（成功図）と攻めて先手有利に進む。後手は二枚成銀が遊び駒となっている。次の▲8三飛が厳しく振り飛車ベースだ。"}, {"id": "中級編-033", "no": 33, "chapter": "中級編", "sfen": "ln5nl/1r1sggkb1/2pp1p1p1/p3p1p1p/1pR1P4/P2P4P/B+sN2PPP1/4G1SK1/L4G1NL b SPp 1", "caption": "問題図は△8七銀成まで", "situation": "三間石田流に対し居飛車は銀交換後、銀を使って押さえ込みを図ってきた。先手は美濃囲いの堅陣なので、大さばきを狙って局面を打開したい。", "choices": [{"label": "A", "move": "▲7九角", "expl": "角取りなので逃げておく。角はこの後▲4六角など、こちらで活用できる。"}, {"label": "B", "move": "▲8五飛", "expl": "角取りに構わず飛車交換を迫る。駒損しても玉形の差で指せるという判断。"}], "correct": "B", "body": "振り飛車の特徴は、玉の堅さを頼りに飛車をさばくこと。舟囲いよりも美濃囲いが堅さで上回るため、強気に大きくさばいて逃げず。\n\nA▲7九角と逃げて、次に△7七成銀△同飛△5五角（変化図）で互角だが、先手は銀桂交換の駒得だが、飛車角の活用が難しい。\n\nここはB▲8五飛と強く戦いたい。以下△同飛同金▲9七成銀の進行は先手大変。しかし、△同金▲4二角成として、87飛、今の手順中△8五同角▲4二角成として、8七飛、87飛が厳しく先手優勢。8七成銀が遊び駒となっている。次の▲8三飛が厳しく振り飛車ベースだ。"}, {"id": "中級編-034", "no": 34, "chapter": "中級編", "sfen": "l4gsnl/3rg1k2/4pp1p1/ppp3p1p/1n2P4/PPPp1P2P/6PP1/3RG1SK1/LN3G1NL b BSPbs 1", "caption": "問題図は△6六歩まで", "situation": "四間飛車対右四間飛車の戦いから、後手が仕掛け、角と銀が交換となり激しい展開。歩を伸ばされた局面で、振り飛車側はどのように反撃していくか。", "choices": [{"label": "A", "move": "▲6三歩", "expl": "角と銀があるので、手筋の歩から飛車をいじめていく指し方。"}, {"label": "B", "move": "▲7三角", "expl": "右四間飛車に対し、この地点に角を打つのが常識的な攻め。"}], "correct": "B", "body": "問題図から△6七銀と打ち込まれると先手がまずい。従って、この瞬間に後手の飛車を狙いつつ、反撃を加える。\n\nA▲6三歩なら△同飛、▲4五角成△7七銀、また△6三同飛、▲4五角成△8五桂、また▲6四飛△8五桂▲7九角（変化図）でいずれも難しい戦いとなる。\n\nここはB▲7三角と飛車取りに打ちたい。△6一飛なら▲6二歩△同金▲6一角成（正解図）で先手よし。△6三飛なら▲6六飛と飛車を押さえ込み、やはり先手が指せる。▲7三角で後手の飛車を封じ込む指し方がポイントだった。"}, {"id": "中級編-035", "no": 35, "chapter": "中級編", "sfen": "l6nl/2gsk1g2/2nppsppb/pr5Pp/2p2pPS1/P1P4RP/1P1PPP3/1BGS5/LNK2G1NL b p 1", "caption": "問題図は△4五歩まで", "situation": "相掛かりの力戦形。先手は棒銀で2筋を攻めて好調な展開だ。後手も飛車の横利きを生かして頑張ってきた局面。落ち着いて攻めを続けてほしい。", "choices": [{"label": "A", "move": "▲2三歩成", "expl": "平凡ながら、自然な攻め方。守りの金を上ずらせて悪形にさせる。"}, {"label": "B", "move": "▲1五歩", "expl": "角の頭が弱点なので、そこを攻めていくのは基本だ。"}], "correct": "A", "body": "2筋で歩がぶつかっており、それを取れない攻めが成功している。手番を生かして攻めを続けたい。\n\n自然にA▲2三歩成と攻めていく。△同金▲3三歩、▲2四歩△同金▲3三歩で先手よし。今の手順中△2二金なら▲1五歩。\n\n先手陣は低い構えなので、場合によっては飛車を切って攻める手段もよさそうだが、B▲1五歩で大変。あるいは▲2三歩成、▲2四歩△同金で角頭を攻めてよさそうだが、たるに▲1四銀△1三歩▲3一角で銀が飛に当たる。△2四歩には△3一角▲4三角成△6二玉△2四歩△3一角で銀が立ち往生、△1四歩△3一角（変化図）で難しい展開だ。"}, {"id": "中級編-036", "no": 36, "chapter": "中級編", "sfen": "ln5n1/1kg3r1l/1s1g1s1p1/pppp1ppbp/4S4/PPPPP1P1P/1SBG2N2/2G4R1/LNK5L b P2p 1", "caption": "問題図は△2四同角まで", "situation": "居飛車対振り飛車の対抗形で、互いに銀冠で持久戦の戦い。先手は入城しておらず、△2四同角が王手になっている。5五の銀が中途半端なので注意したい。", "choices": [{"label": "A", "move": "▲8八玉", "expl": "取りあえず玉を囲いに入れておくことで、強い戦いができる。"}, {"label": "B", "move": "▲6八角", "expl": "角を引いて、いつでも角を交換できる状況にしておく。"}], "correct": "B", "body": "中盤の段階で無条件の駒損は致命傷となる。損をしないように手順を駆使したい。A▲8八玉とかわしながら囲いに入れるのは大きな手だが、△5四歩（失敗図）で困る。以下△6四銀△同角△2三飛△二一角と進むが、竜を作っても銀損が大きく先手不利。\n\nB▲6八角がピンチを救う一着だ。△5四歩なら▲4六銀（正解図）、あるいは▲4六銀で銀が生還する一着だ。これは互角の形勢の将棋だ。△6八角△同角成△二三金△5五銀、そのときに△5四歩、△二三飛成でよい。"}, {"id": "中級編-037", "no": 37, "chapter": "中級編", "sfen": "l4r1nl/2k1g1g2/3sp2p1/p1p1s1p1p/1p1n1P3/P1PGP1P1P/1P2sSN2/2GB3R1/LNK5L b B3Pp 1", "caption": "問題図は△5七銀まで", "situation": "相居飛車戦の力戦形から、後手が右玉へと変化した中盤戦。先手が矢倉囲いにしたとき、後手は角切りから猛攻を仕掛けてきた。しっかり受け止めてほしい。", "choices": [{"label": "A", "move": "▲6七金引", "expl": "強引な攻めに対して、柳に風と軽く受け流す指し回し。"}, {"label": "B", "move": "▲6五金", "expl": "強気の攻めには、こちらも負けずに反発していく。"}], "correct": "B", "body": "駒がぶつかっているときこそ、落ち着いて対処したい。問題図から△5七同角は最悪で、△同銀なら同桂成で後手の攻めに勢いがつく。\n\nA▲6七金引は有力で、△6八銀成△同金引△3九角▲5八飛△3三桂（変化図）の一例、難しい形勢ながら、先手陣は▲6八桂のキズを抱えているのが気になる。\n\nB▲6五金が巧みな切り返しで、△同銀なら▲6二角と先手よし。△同飛（正解図）で、手順に6五の角を取れて先手優勢。以下ひもが付くため△6四金▲8五飛、また正解図から△5七角も、以下△5四歩で先手有望。また正解図から△6七桂で先手が指せる。"}, {"id": "中級編-038", "no": 38, "chapter": "中級編", "sfen": "ln1g4l/1ks1g4/1ppppsnp1/p4pr1p/6PPL/P1P1PPSb1/1P1PS1p2/1BKGG1R2/LN5N1 b p 1", "caption": "問題図は△3七歩まで", "situation": "石田流に対し、居飛車が袖飛車から石田崩しを敢行した展開。▲3五歩で飛車を捕獲したところに、△3七歩と切り返したところ。駒がたくさん当たって複雑だが、落ち着いて対処したい。", "choices": [{"label": "A", "move": "▲3四歩", "expl": "先に飛車を取り、続いて桂を取りながら、と金も作れる。"}, {"label": "B", "move": "▲3七同飛", "expl": "後手の飛車は詰んでいるので、すぐに取る必要がない。"}], "correct": "B", "body": "前問に引き続き、複雑な当たりを処理する問題。A▲3四歩だと、△3八歩成▲3三歩成△5四銀（失敗図）と、先手は桂得で手番を握っているが、美濃囲いの堅さが生きる展開。一本道、四銀▲5四歩、▲5四歩、3五角不便、△3九飛～▲4一飛、△五角が幸便、△3九飛～▲4一飛で振り飛車ペースだ。8四角が厳しく、これは振り飛車ペースだ。\n\nの堅さで言う居飛車は、もう少しポイントを挙げる必要があった。B▲3七同飛が落ち着いた一着で、△3八角▲3八同角△3七同桂（正解図）と進む。ただし、後手には△3四歩△2五桂の好手があり、簡単でなく以下△3四歩△3七同桂△3二歩成△5四銀△3三歩が進行の一例でやや先手に分のある終盤戦だ。"}, {"id": "中級編-039", "no": 39, "chapter": "中級編", "sfen": "3+R3nk/5sgsl/5g1pp/p1+B1ppp2/8P/P1P1SPPP1/N1+b1PGN2/L5SK1/1+r3G2L b NL4Pp 1", "caption": "問題図は△8九飛成まで", "situation": "後手の居飛車穴熊は堅いが、先手は先に桂香を取っているので指せる。駒得を生かして穴熊を崩したいところだ。どこが急所か盤上を見渡してほしい。", "choices": [{"label": "A", "move": "▲6四歩", "expl": "穴熊の攻略には、と金攻めが有効。▲6三歩成〜▲5二とが速い攻めとなる。"}, {"label": "B", "move": "▲1四歩", "expl": "定番となっている端攻め。▲1四歩〜▲1三歩から攻めていく。"}], "correct": "B", "body": "穴熊を崩すためには、小技を繰り出すことも必要となる。と金と馬の存在は心強いが、大胆でけでは攻略が難しい。A▲6四歩に受けはないし、と金攻めが間に合えばわかりやすい攻めとなる。しかし、△5五歩（失敗図）が嫌な手で、▲6五銀と逃げる感触がよくない。\n\n問題図で、先手は桂香と歩をたくさん持っている。このような局面は端攻めが有効になっていることを確認したい。B▲1四歩（正解図）と突き、△同歩▲1三歩△一三同香▲1五歩▲二五桂、一例で攻めが続く。1段目に竜が利いているので、端攻めがより有効になっていることを確認したい。"}, {"id": "中級編-040", "no": 40, "chapter": "中級編", "sfen": "lR5nk/5+Bgsl/7p1/p1p2pp1p/4p4/Pp+bP2P1P/1P5P1/4P2SL/L+r3GGNK b GNP2sn2p 1", "caption": "問題図は△3二同金まで", "situation": "相穴熊の終盤戦。3筋で駒の交換が行われたところで、馬取りとなっている。馬を逃げる手もあるが、自玉が安全なので攻めていく手を考えたい。", "choices": [{"label": "A", "move": "▲3二同馬", "expl": "終盤は駒の損得よりもスピード。大事な馬だが、守りの金と交換して寄せていく。"}, {"label": "B", "move": "▲4三歩", "expl": "歩を使う攻め。穴熊の攻略は、小技を絡めることが有効となる。"}], "correct": "B", "body": "穴熊戦では先に食いつくことが重要となる。先手の穴熊は崩されていないので、寄せにいくチャンスだ。\n\n敵玉を薄くするA▲3二同馬は考えられるが、△同馬（失敗図）で継続の攻めが難しい。▲4一銀が有効だが、現状は持ち駒が銀なので馬を切る手は損な攻め方だ。\n\n問題図から馬を逃げずにB▲4三歩（正解図）がうまい攻め。△4二金なら▲同歩成、と金ができるため寄り形となる。また▲4三歩△同金▲4四歩△4三同金▲3二角成△3二同金▲4三桂、二玉と受けても▲5三角成△3二歩△二二金がある。飛車角を8三の地点を狙う攻めを覚えておきたい。"}, {"id": "上級編-001", "no": 1, "chapter": "上級編", "sfen": "ln6l/2kgg4/sppppsn2/p6rp/1PS2pp2/PR1P4P/2N1PPPP1/4GGKS1/L6NL b BPbp 1", "caption": "問題図は△3五歩まで", "situation": "相振り飛車の中盤戦。先手は攻めの銀を繰り出して主導権を握る展開だ。後手の金無双は、端に銀を上がって8筋に備えているが、それでも弱点がある。", "choices": [{"label": "A", "move": "▲7四歩", "expl": "飛車の横利きを消す意味と、▲5五角のラインも含む攻め。"}, {"label": "B", "move": "▲5六角", "expl": "好所の自陣角。8、9筋をにらんで攻めを狙っている。"}], "correct": "B", "body": "金無双は、上部に強い構えとされているが、手が付くまで案外もろい囲いがある。それを見抜く力を養いたい。\n\nA▲7四歩（変化図）は自ら銀を取られにいっているようだが、▲8三銀△同飛▲8二銀と進み、これからの将棋だ。今の手順中、△7四同銀▲同銀△同飛▲8三銀と、▲7四同銀には▲8二銀があるので互角に進む。\n\nB▲5六角（正解図）で、銀でやや無理筋。同歩には△5五歩、△7五歩△9一角成△8二飛、▲8四歩△同飛▲4一銀以下決戦で先手有望。8四歩△8三銀▲5六角成△6五歩、▲6二と寄りを打ち付け、▲4一銀の強襲がある。飛車角を8三の地点を狙う攻めを、覚えておきたい。"}, {"id": "上級編-002", "no": 2, "chapter": "上級編", "sfen": "ln2bg1kl/1r5s1/p2psgnp1/2p1ppp1p/1p7/2PSPPPPP/PPBP1GN2/2R3SK1/LN3G2L b - 1", "caption": "問題図は△2一玉まで", "situation": "後手はミレニアム囲いに組もうとして、△2一玉と引いたところ。次に△3二金と締まれば、ひと安心となる。先手は離れ駒ができたこの瞬間に動いていきたい。", "choices": [{"label": "A", "move": "▲6五銀", "expl": "6七歩—6六銀型を生かした攻め方。単騎の銀で揺さぶりをかける。"}, {"label": "B", "move": "▲5五歩", "expl": "角と銀の協力で、歩をぶつけて攻めていく自然な指し手。"}], "correct": "A", "body": "問題図から▲2七銀△3二金▲3八金も一局で、これからの将棋。しかし、ここは後手陣が不安な形なのでチャンスだ。\n\n単純ながらA▲6五銀が面白い。△7四銀▲5四歩を防いで8四歩は△9五角△同歩△同角（正解図）で先手好調。\n\nB▲5五歩が指せる。△同銀▲同角△同銀（失敗図）で難しい展開だ。次に△7三角があるので、先手は焦る展開だ。"}, {"id": "上級編-003", "no": 3, "chapter": "上級編", "sfen": "7rl/1+B3kg2/P1+P1pgnp1/3pssp1p/1p3p1P1/2pPP1P1P/1PN3N2/2GK2G2/R7L b BNLP2slp 1", "caption": "問題図は△7六歩まで", "situation": "角換わり腰掛け銀から激しい戦いとなり、終盤の入口あたり。△7六歩と桂取りに打たれた局面で、攻め合いを選択するか、それともひとまず受けに回るか。", "choices": [{"label": "A", "move": "▲9二歩成", "expl": "攻め合いを目指す。▲8一と〜▲9二飛成で寄せを狙う。"}, {"label": "B", "move": "▲7四と", "expl": "△7七歩成なら▲同玉で、以降は入玉含みの展開を考える。"}], "correct": "B", "body": "終盤の寄せ合いで大切なことは、自玉の安全度を正確に判断できるかどうか。大局観を誤ると、敗勢につながる。\n\nA▲9二歩成は▲7五香▲8一と▲7七歩成△8八銀（失敗図）で後手の攻めが速い。これは一本道で負けになるため、先手は工夫が必要だ。\n\n後手の狙いは△7七歩成ではなく、△7一桂が大事。ここは相手の狙いを消しておく、B▲7四と（正解図）が落ち着いた好手だ。△7七歩成は▲同玉も手順に逃げだし、自玉は安全となる。▲7五の地点に駒を打たせない感覚がポイントだった。"}, {"id": "上級編-004", "no": 4, "chapter": "上級編", "sfen": "lr6l/2kg2g2/2ns1snp1/p1pppb2p/1p4PP1/P1PPP1S1P/1PBS5/2G1G1R2/LNK4NL b P2p 1", "caption": "問題図は△4四同角まで", "situation": "相雁木の出だしから、後手が右玉へと変化した中盤戦。4筋で折衝が行われたところ。先手は3筋の位を生かして、局面をリードしたい。ここからどのような展望を描くか。", "choices": [{"label": "A", "move": "▲3七桂", "expl": "遊び駒の桂を活用していく。次に▲4五桂△同桂▲同銀と進めば調子がよい。"}, {"label": "B", "move": "▲4七銀", "expl": "3筋に位を張ったので銀の役目は完了。銀を中央に働かせつつ、3三の桂を目標にする。"}], "correct": "B", "body": "中盤では駒の働きが重要だが、先手は3六の銀が遊ぶ展開は△4二金、△5三銀と寄せていくような進行が考えられる。\n\nA▲3七桂は遊び駒を活用して本筋のようだが、△4二金▲4五桂△同桂△同銀は、△4六桂（失敗図）が飛車金両取りで先手まずい。\n\nB▲4七銀と引いて好機に▲4四歩を狙う。以下は▲4二金▲5三角△5二銀（正解図）が進行の一例で、先手はうまくいったと言える。引いて立て直すことが本筋となる。この後、▲3四年は△2五桂で難しいので、▲4八金合行や△5八歩などタイミングを計っていくのが大切だ。"}, {"id": "上級編-005", "no": 5, "chapter": "上級編", "sfen": "lr5nl/3k1sg2/2ns3p1/p2pgpp1p/1pp1p2P1/P2P1PPRP/1PS1P+BN2/1KG6/LN3S2L b Bgp 1", "caption": "問題図は△8一飛まで", "situation": "角換わり腰掛け銀の中盤戦。先手は角金交換の駒得だし、自陣の馬も手厚い。ただし、歩切れと7筋のキズが気になる。4九の銀も離れているので、その辺りをどう考えるか。", "choices": [{"label": "A", "move": "▲2四歩", "expl": "飛車先の歩を交換しておく。歩を持てば▲7四歩がある。"}, {"label": "B", "move": "▲5八銀", "expl": "後手の攻めに備え、遊び駒を中央に活用していく。"}], "correct": "B", "body": "有力な手が複数ある場合、どの手を優先するために大局観を問われる。一番ポイントの高い指し手を選ぶ。\n\nA▲2四歩△同歩△2八飛△6五歩（変化図）と進む。▲7四歩を防がれながら攻められて難しい形勢だ。\n\nB▲5八銀が遊び駒の活用を図る本筋の一着。以下△6五歩▲6一銀△6二銀（正解図）が間に合って味がよい。▲6七銀と上がり、4九の銀が6七に移動できていることと美しいと言えそう。きれば、優れた大局観と言える。飛車先の歩を交換するのも大切な手だが、それよりも遊び駒の活用が大事なポイント。"}, {"id": "上級編-006", "no": 6, "chapter": "上級編", "sfen": "l6nl/3sgkg2/p3p1sp1/3p1pp1p/2Pn5/1rS2PPRP/P2PPSN2/2GK1G3/LN6L b B3Pbp 1", "caption": "問題図は△8六同飛まで", "situation": "後手が速攻の構えから、桂を跳ねていきなり仕掛けてきた。軽い攻めだが、しっかり受けないと危険な筋がひそんでいる。金を上がるか、銀を引くかの二択問題。", "choices": [{"label": "A", "move": "▲8七金", "expl": "7六銀型は上部に手厚いし、△7七歩とたたかれる手も未然に防いでいる。"}, {"label": "B", "move": "▲8七銀", "expl": "7筋の位は守りが薄くなるが、銀冠の好形を作っておく。"}], "correct": "B", "body": "後手の仕掛けは銀が参加していない攻めなので、やや無理筋のように思える。しかし、後手玉は飛車を渡しても大丈夫な低い陣形で、手筋もしているため大技が成立しやすい状況になっている。\n\nA▲8七金は8一飛取りも大きな低い手で、▲8五飛なら△9六歩や△8五金、△9五角（失敗図）が厳しい。一着で先手が参ってしまう。\n\n8六金△同飛▲5八玉△7九飛成▲4二角△5九玉から、△7一玉までで先手不利。また△6七歩成▲6七同金▲7七桂と引くことになる。その局面で▲同飛成は△無理筋、▲6八銀（正解図）と収めてひと安心。▲6六歩の桂取りを生かしてとならず後の展開に。"}, {"id": "上級編-007", "no": 7, "chapter": "上級編", "sfen": "ln3g1nl/1r2g1k2/2sp1psp1/p1p3p1p/3PB4/PbP5P/2NS1PPP1/1R2G1SK1/L4G1NL b 2P2p 1", "caption": "問題図は△8六同角まで", "situation": "振り飛車対矢倉模様の戦いから、後手が△8六歩▲同歩△同角と歩を交換した局面。後手の飛車角が窮屈なところを突いて、何か手段がありそうだ。", "choices": [{"label": "A", "move": "▲8四歩", "expl": "持ち駒の歩を生かした攻め方。後手の飛車角の連係を断つ狙い。"}, {"label": "B", "move": "▲7五歩", "expl": "先手の角は後手の飛車をにらんでいる。角のラインで飛車を目標にする攻め。"}], "correct": "A", "body": "互いの飛車が向かい合う形は、その間にいる駒がお荷物となるケースが多い。問題図の8六角がその例の駒で、後手は動きづらい状況になっている。▲8三歩△8五角▲8四歩△8五歩で簡単。あいにく歩は2枚しかないがA▲8四歩（正解図）と垂らすのが好手だ。\n\nB▲7五歩は筋のよい手で、△同角は▲8二歩、3手あれば▲8三歩、▲8五歩で先手勝勢だ。△8四同飛は▲8五歩、いずれも先手勝勢だ。△8四同飛は▲8五歩、△同銀▲6六角△7四飛△6五銀△7五歩△7四同銀（変化図）し、振り飛車十分ながら簡単ではない。"}, {"id": "上級編-008", "no": 8, "chapter": "上級編", "sfen": "l2g3nl/2s1ksg2/2np1p1p1/pr6p/4pN3/P1P4RP/1PSPPP3/2G1K1S2/LN3G2L b B2Pb3p 1", "caption": "問題図は△5五歩まで", "situation": "相掛かりの中盤戦。後手は△5五歩と飛車の横利きを通しながら、将来△5六歩から玉頭攻めを含みにしている。先手はここから、どのような方針で指すのがよいだろうか。", "choices": [{"label": "A", "move": "▲6六銀", "expl": "中央に銀を繰り出して、玉頭に厚みを築いておく。"}, {"label": "B", "move": "▲3三歩", "expl": "先手は4五の桂が不安定なので、▲3三歩から桂交換しておく。"}], "correct": "A", "body": "現状は大丈夫でも、いずれ攻めてこられて困ることになるのが必要。そのときに備え、先に受けておくことも必要。\n\nA▲6六銀（正解図）が正しい大局観だ。今は△5六歩は△同飛▲同金で、先手の飛車が移動した場合、△5六歩△5七角、同玉▲6六桂取りの王手取りが見える。従って、5六歩△同金▲5七角の王手取りが見える。従って、5六歩は無効だ。\n\nB▲3三歩は、△同桂銀成△同銀（変化図）で一局だが、先手は桂を持っても、すぐに使う場所がなさそう。▲3三歩は手順上、3三の歩が手順上、△4四歩△5四歩は△4四歩△4四角もあるので桂交換を急ぐことはない。"}, {"id": "上級編-009", "no": 9, "chapter": "上級編", "sfen": "l2g3nl/2s2kg2/4p1spp/p1pp1pp2/3nb2P1/PrPP1PP2/4PS2P/1SGK3R1/LN3G1NL b BPp 1", "caption": "問題図は△5五角まで", "situation": "角換わりの出だしから、後手がいきなり△6五桂と跳ねて動いてきた。少し無理攻めのようだが、先手はしっかり対処しないとつぶされてしまう。正確な受けを考えてほしい。", "choices": [{"label": "A", "move": "▲8七銀", "expl": "後手の狙いは△6六角や△7六飛、▲6五歩なら△8八角成なので、それを防いでおく。"}, {"label": "B", "move": "▲6七玉", "expl": "△6六角と出られると面倒。▲6七金は△8八飛成があるため、力強く玉で受ける。"}], "correct": "B", "body": "後手は低い構えで速攻を仕掛けてきた。先手は飛車は切ってくる手も、視野に入れておく必要がある。\n\nA▲8七銀は飛車を追う手だが、△6六角、これは待っていましたと△同飛、次に△5七角、次に△6六角（失敗図）で先手敗勢。△5八金と受けても▲6九角(桂)成があり、▲5八金と受けても▲9八角成がります。\n\n玉B▲6七玉（正解図）が正解。△6六角と△7六飛を同時に防ぐ。玉上がったことが桂と活躍する手なので、これでひと安心といえる。後手は△4五歩ぐらいだが、▲6五歩△4六歩△6四歩と桂を捕獲する手もある。後手は△5六歩と角を捕獲する手もある。先手有利だ。"}, {"id": "上級編-010", "no": 10, "chapter": "上級編", "sfen": "lr4knl/3g2g2/4p1sp1/p1pbsPp1p/1p1n3P1/P1PpS1PBP/1PS1PRN2/2G1G4/LNK5L b Pp 1", "caption": "問題図は△6五同桂まで", "situation": "角換わり腰掛け銀からお互い自陣角を放ち、中盤の難所を迎えている。後手が△6五同桂と歩を払った局面。何か技がかかりそうなところなので、しっかり読みを入れたい。", "choices": [{"label": "A", "move": "▲4三歩成", "expl": "大事な拠点を成り捨てるようだが、飛車の利きを生かした攻め方。"}, {"label": "B", "move": "▲6五同銀", "expl": "桂を取りつつ、5四銀の利きをそらせて▲4三歩成を実現させる。"}], "correct": "A", "body": "次の一手を考えるとき、いくつかある中から有力な指し手を選んでいくわけだが、その組み合わせが重要だ。\n\nA▲4三歩成が軽手で、△同飛なら▲6五銀と桂を取れる。▲4三成△同金は▲6五銀△4六歩△5四銀（正解図）で先手よし。\n\n従って、今の手順中△5四銀△同金だが、4八角と引き、先手得もしっかり指せる。B▲6五同銀（変化図）のときに違う。△4六歩は▲4七同金で正解図と同じだが、△4六歩△5七同銀と進めば正解図と同じだが、△4三歩成は△同金とは取ってくれない。手順前後に注意したい。"}, {"id": "上級編-011", "no": 11, "chapter": "上級編", "sfen": "l4rk1l/3g2g2/4pp1pp/p1p1sn3/3p3nP/PPP2Pp2/1S1SPG3/1G1K1RP2/LN5bL b BSN3p 1", "caption": "問題図は△6五歩まで", "situation": "角換わり腰掛け銀の中盤戦。銀桂交換の駒得だし、後手は2九角の働きがいま一つなので、先手が少し指せそうな展開。攻めを考えたいが、その前に自陣の手入れをしておきたい。", "choices": [{"label": "A", "move": "▲7八金", "expl": "壁金のままでは戦えないので、離れ駒を玉に寄せつつ自陣を引き締める。"}, {"label": "B", "move": "▲7九玉", "expl": "6筋の歩が伸びてきたので、それを避けつつ玉の早逃げ。"}], "correct": "B", "body": "攻めていく場合、駒を渡すことになるので、その反動に気をつけたい。問題図は壁金のように、解消しておくことが大切だ。\n\nA▲7八金は有力な一着だが、この手に対して△8八歩（失敗図）が飛んでくる。▲同金は一手パスになってしまう。この大事なときにパスは命取りだ。\n\nB▲7九玉（正解図）が大局観の一着で、次に▲7五金と寄ったり、玉を引いた効果で今度は▲8八歩が無効となる。▲7八金と寄せ、△8一玉と入城して先手は鉄壁となり、後は思い切って攻めていける。後手がその前に暴れてくれれば、相手から乗りかかって応対する変動だ。"}, {"id": "上級編-012", "no": 12, "chapter": "上級編", "sfen": "ln3kbnl/2r3g2/p4g1pp/1s2psp2/1p1pPN1R1/3P2P2/PP1S1S2P/2GBG4/LN1K4L b 3P2p 1", "caption": "問題図は△6五歩まで", "situation": "雁木対矢倉の中盤戦。先手が仕掛け、後手が反撃して激しい戦い。△6五歩は攻めの手筋で、△7五銀〜△6六歩のような展開になると先手不利。うまく切り返してほしい。", "choices": [{"label": "A", "move": "▲5六銀右", "expl": "駒を中央に進出する一着。4五の桂にひもを付けつつ、6筋の守りにも利かせた。"}, {"label": "B", "move": "▲4二歩", "expl": "焦点の歩。どの駒で取るか後手の態度をうかがってから、次の攻めを繰り出す。"}], "correct": "B", "body": "将棋は、全ての駒を活用させるのが理想の展開。逆に言うと、相手の駒が働かないようにすることも戦術の一つだ。\n\nA▲5六銀右は本筋に見えるが、△6六歩▲同銀△7五銀▲同銀△同角（変化図）と進むと、先手も指せるものの後手の駒も躍動してくる。8四の銀を働かせる展開は避けたい。\n\nB▲4二歩（正解図）が軽手。後手は角以外の駒で取らなくなってしまう。△2四同角はこの手だが、▲2四同角は▲4三銀継続。4二同角または▲3二同飛△2三歩△6三角△6三同金、4一同金または▲4三歩成、角を持って▲2四歩が、一連の好手順だ。"}, {"id": "上級編-013", "no": 13, "chapter": "上級編", "sfen": "ln1g3nl/1ks1rg3/1ppp1p2p/pl2P2p1/3+BSSp2/P1P6/BP1P1P2P/2KGp4/LN1G4+r b SPnp 1", "caption": "問題図は△5八歩まで", "situation": "ゴキゲン中飛車の終盤戦。先手は中央に厚みを築いているのが大きいが、後手も手筋の歩を垂らして攻めを見ている。寄せ合いに出るか、それとも受けを選ぶか。", "choices": [{"label": "A", "move": "▲5三銀", "expl": "と金攻めも怖いが、5筋の拠点を生かして寄せ合い。"}, {"label": "B", "move": "▲5八同金上", "expl": "攻め合いは危険とみて受けに回る。後手は攻め駒が豊富ではないので、面倒を見る指し方。"}], "correct": "B", "body": "終盤の攻防は攻めを選ぶか、それとも受けに回るかの大事な場面が多い。しっかりと読みを入れ、正しい大局観が要求される。\n\nA▲5三銀は強烈な攻めだが、△5九次に▲4二銀成△同飛、4二同金、6九同飛成、▲4二同飛、4二角成△同飛と進むと、9角成、5九成銀（失敗図）と進むと先手も6九と▲8七香成、失敗図と進んで後手の攻めが速い。\n\nB▲5八同金上が冷静な応手だ。△8七香成に▲8二歩成、後手は手駒2枚で有効な手段がなく、次に▲6二角成△同飛△同金と桂を捕獲する順とそれよりも▲7八金で受け止めている。次に▲4三歩成、▲3一銀成（正解図）で受け止めている。先手は飛車角を取得する順がないため、長引いても、後手の攻めを受け止めておくのが正しい大局観。"}, {"id": "上級編-014", "no": 14, "chapter": "上級編", "sfen": "ln6l/4s1gk1/5gns1/pr1Ppppbp/4P2p1/PPp1SPP1P/N6P1/L2B1R1SL/5GGNK b 2Pp 1", "caption": "問題図は△8四飛まで", "situation": "振り飛車穴熊対銀冠から、小競り合いが行われ、中盤の難所が訪れている。穴熊らしく、大さばきに出たいところで、センスが問われる局面だ。", "choices": [{"label": "A", "move": "▲4五歩", "expl": "角交換を挑み、激しい展開に持ち込む。戦いになれば、穴熊の堅さが生きる。"}, {"label": "B", "move": "▲6三歩成", "expl": "軽い成り捨て。△6三同銀と取らせて、離れ駒を作る狙い。"}], "correct": "B", "body": "将棋は手順の組み合わせが重要だ。指し手がうまくいかなくても、工夫次第で成立することがある。\n\nA▲4五歩は狙いの筋。△同歩は▲2四歩△5七歩成△2四同銀▲2五歩が飛角銀両取りとなる。従って△6八角成立する。従って▲4五歩には▲6八角成の一手だ。\n\nただし、▲6八同飛に△7七歩成（変化図）がしゃくで、先手は悪くないものの、もう少し工夫したい。B▲6三歩成から入る。△同銀▲4五歩と突けば、△同飛取らせて△同飛△同飛△6八同飛（正解図）が銀取りも続く。以下△6八同飛なら▲4五歩からめがめると続き、手順の組み合わせで、局面はガラッと変わる。"}, {"id": "上級編-015", "no": 15, "chapter": "上級編", "sfen": "l6nl/1r4gk1/2n1pgb2/p1pps1pPp/1p3p3/P1PPP3P/1PSG1+sNp1/1KGB2R2/LN6L b S2P 1", "caption": "問題図は△4七銀成まで", "situation": "相矢倉の戦い。先手が金矢倉にがっちり囲って先攻した。後手は守備に徹して受け止める展開。飛車取りに銀を成られた局面で、先手の方針を考えてほしい。", "choices": [{"label": "A", "move": "▲3九飛", "expl": "飛車は大事な駒なので逃げておき、次の攻めを繰り出す。"}, {"label": "B", "move": "▲2五桂", "expl": "飛車を逃げていると押さえ込まれそう。飛車取りに構わず攻めていく。"}], "correct": "B", "body": "中盤から終盤の入口あたりの局面、駒の働きが大切なポイント。大駒は取られたくないが、逃げ回ってしまっては活用できない。\n\nA▲3九飛は飛車を活用するべきポイント。大駒は取られたくないが、▲2八歩成△7九飛、△3七成銀（失敗図）で先手大変。飛車を取られる心配はないが、攻めを続けるのが難しい展開だ。ここは飛車を逃げずに攻めに使いたい。\n\nB▲2五桂（正解図）と跳ねて、△3八銀成は▲3八同金、△二二銀▲二五歩△二二銀▲三三桂成△二二銀▲三三桂成、△二二銀▲三三桂成同金▲二五歩の要領で攻めが続く。先手は金矢倉の堅陣なので、思い切って攻めることができる。飛車は取らせることによって働くという考え方が大切だ。"}, {"id": "上級編-016", "no": 16, "chapter": "上級編", "sfen": "ln2k3l/1sg2s1r1/ppp1ppn1p/3Sb1p2/9/1R2B2g1/PPNPPPP1P/2GK2SP1/L5GNL b P2p 1", "caption": "問題図は△2六金まで", "situation": "阪田流向かい飛車から、互いに筋違い角を打ち合って力戦形となった。後手は棒金で次に△2七歩から突破を狙っている。うまく対応してほしい。", "choices": [{"label": "A", "move": "▲3四角", "expl": "歩を補充しながら、2筋の歩が切れたときに▲2三歩を用意する。"}, {"label": "B", "move": "▲3六歩", "expl": "▲3五歩〜▲3四歩を狙いながら、▲3七桂や▲3七銀の活用も見た一着。"}], "correct": "B", "body": "次に△2七歩と打たれて、△同歩△同同銀（△同角成）と突破されると先手がまずい。\n\nA▲3四角は▲2七歩△同飛成、3八角と浮くのが角筋を避ける手筋で、2三歩でうまい。しかし、△3四角は▲2四飛△5六角と▲5六歩、5六同角と進むと、5六歩、5六同飛角▲3六歩で△浮くのが筋違いを避けるためにB▲3六歩が柔軟。\n\nな発想で、直線に対して曲線でかわす感覚だ。この手に対して△2三歩△二三角▲2三同金△2三同角△三五角△2三角▲二四金△2三歩▲二三角▲三六角（成功図）で先手好指せる。今の手順中、△3四角に▲2四同金▲3五角△2四角△3八金、3五歩△三同金△三六歩、後手は歩△3八歩△二四角△2五銀が響く展開だ。"}, {"id": "上級編-017", "no": 17, "chapter": "上級編", "sfen": "ln3g1nl/1r2g1k2/p1ppspsp1/4p1p1p/3P1+b3/1SP5P/P3PPPP1/1R2G1SK1/LN3G1NL b B2P 1", "caption": "問題図は△4五角成まで", "situation": "角交換振り飛車から戦いが始まった。後手は1歩を捨てて馬を作ったが、歩切れなので善悪は微妙だ。先手は馬が働かないようにして8筋を突破していきたい。", "choices": [{"label": "A", "move": "▲8五銀", "expl": "無防備な8筋を狙い、棒銀の要領でこのまま銀を前進させていく。"}, {"label": "B", "move": "▲8四歩", "expl": "持ち歩が2枚あることを生かし、スピードをつけて攻めていく。"}], "correct": "B", "body": "この局面は馬の存在が大きいが、後手は歩がないので、先手はそこを上手く突く攻めを考えたい。\n\nA▲8五銀は自然な指し手で、△5五馬なら7七銀と引くなら話は早いが、△8四歩は▲8五銀△6五馬（失敗図）で難しい。B▲8四歩が2枚の歩を生かした攻め方で、△5五馬なら7七銀と引くと取ることになる。従って、以下▲8五歩▲8四歩は8七歩と取ることになる。以下▲8三銀成（正解図）で先手有利、8筋の突破と、△5五馬と寄られたときの兼ね合いが課題手だった。"}, {"id": "上級編-018", "no": 18, "chapter": "上級編", "sfen": "3g3rl/1ks2g3/p1pp1sn2/1p2ppp1p/R8/2P1PS2P/3P1PPP1/2G3SK1/5G1NL b BNLPbnl2p 1", "caption": "問題図は△9三同歩まで", "situation": "相振り飛車の戦型から、先手が9筋から先攻して互いに桂香を持ち駒にしたところ。攻めの駒と守りの駒の交換なので先手が指しやすい展開だが、この後の方針を問う。", "choices": [{"label": "A", "move": "▲9九飛", "expl": "大駒が敵陣に近づいていると攻めが難しい。あらかじめ、当たりを避けておく。"}, {"label": "B", "move": "▲7五角", "expl": "一息入れると、後手に手番を与えてしまう。休むことなく攻めを続ける。"}], "correct": "B", "body": "後手玉を薄くしたので先手十分だが、後手も桂香を持ち駒にしているので、攻めてくることを想定しないといけない。\n\nA▲9九飛は落ち着いた手だが、以下△4五歩▲5七銀△2三香▲3五桂（失敗図）の進行は後手の攻めが速い。▲9三香成は後手の△7一玉に逃げるルートがある。\n\nここはB▲7五角と攻めを続けたい。△9四香なら▲三角成△9九香成▲4三馬と4三、飛車を取れるので先手よし。▲6六角（正解図）で、次の▲8二歩△同香▲6二歩△同香、▲6二歩△同香、4三飛角を狙いに、後手に駒を使わせて自陣を緩和することがポイントだった。"}, {"id": "上級編-019", "no": 19, "chapter": "上級編", "sfen": "ln1g3Rl/1ks1g4/ppp1ps2n/3p1pp1p/9/2P1PP3/PP1PSSP1P/2KGG4/LN5NL b BPrbp 1", "caption": "問題図は△5二金左まで", "situation": "居飛車対振り飛車の対抗形から飛車角総交換となり、先手が飛車を先着した。ここからの方針が大切で、攻め合いを目指すか、それとも局面を長引かせて戦うかを判断してほしい。", "choices": [{"label": "A", "move": "▲1一飛成", "expl": "後手より先に飛車で桂香を取り、その先の攻めを考えていく。"}, {"label": "B", "move": "▲2八飛成", "expl": "単純に攻め合うと、美濃囲いの堅さが生きるので、竜を引き上げてじっくり指す。"}], "correct": "B", "body": "先に飛車を下ろし、先手は桂香を取れる展開だが、その進行は後手にもいずれ桂香を奪われ、駒の損得はなくなる。\n\nA▲1一飛成は▲2八飛と進み、後手も次に△1二香、△2九飛成（失敗図）となり、その局面は玉形の差で、居飛車が自信のない展開だ。\n\n従って、先手は息の長い進行を目指す。B▲2八飛成（正解図）と引き上げるのが正しい大局観。△1二歩なら、のちに▲1三の桂を取りに行く。1一角成、3三角の局面になっても▲1三、後手は玉の堅さである手で、寄せ合いではなく、じっくり指す方針が望ましい。"}, {"id": "上級編-020", "no": 20, "chapter": "上級編", "sfen": "l1B4nl/4rgk2/3s1p1p1/p1p1g1p1p/5N3/P1Ps1PPPP/5G1S1/4R1GK1/LN6L b N3Pbs3p 1", "caption": "問題図は△5四金まで", "situation": "居飛車対振り飛車の対抗形で、後手は5筋位取りから仕掛けてきた。先手は銀冠に組むことができてまずまずの展開。押さえ込まれる前に攻めを続けたい。", "choices": [{"label": "A", "move": "▲5四同飛", "expl": "飛車先を止められると使えない。その前に切り飛ばして寄せをにらむ攻め。"}, {"label": "B", "move": "▲6四歩", "expl": "歩を絡めた攻めが有効。5筋と6筋に歩が利くことを考慮した攻撃。"}], "correct": "B", "body": "問題図から△5七歩などで飛車先を止められると活用が難しくなる。飛車筋が通っている間に攻めを繰り出したい。\n\n飛車筋を生かして切り飛ばすことも考えられるが、A▲5四同飛△5三金▲5九飛成（失敗図）と進むと、先手玉にもいきなり危険が訪れる。\n\n問題図ですぐに▲5三歩と打つのは▲7二飛で先手好調。その点を念頭に置いてB▲6四歩（正解図）が軽手。△同歩は5三歩が効果的となり、今度は▲5三桂成でよい。△6四同歩なら▲5三金、5三歩△6四同飛、銀の連係を崩す、歩の手筋だ。"}, {"id": "上級編-021", "no": 21, "chapter": "上級編", "sfen": "+R4g1nl/6sk1/3psgbp1/p3p1p1p/3n1p3/PP1P1P3/2p1P2PP/1BS2G1SL/LN4GNK b L3Pr 1", "caption": "問題図は△7七歩まで", "situation": "振り飛車穴熊対居飛車左美濃の戦い。終盤の入口あたりの局面で、先手は7、8筋の角銀がネックとなっている。重い形を、どうほぐしていくか。", "choices": [{"label": "A", "move": "▲6五歩", "expl": "穴熊がしっかりしているので、左翼の駒をさばいていく。"}, {"label": "B", "move": "▲7七同桂", "expl": "素直に桂で取る。遊び駒の桂が活用できるので、ありがたい。"}], "correct": "A", "body": "先手は穴熊が堅く竜を作って香得しているが、現状の持ち駒だけでは攻めが難しい。左翼の角や銀をさばいても持ち駒に変わりがない。\n\nA▲6五歩と進み、銀桂交換の駒損となる。しかし、その局面で手番を握り▲3五歩（正解図）が急所の一着。\n\n正解図から△3五同歩なら▲3四同金、▲7八歩成も難しい。▲3四同金、▲7八歩、4三同金、▲4五歩は先手ペースだ。7、8筋の角銀が、持ち駒の角桂となっていることが大きい。\n\nB▲7七同桂は△同同角成、桂を残しているこれ、これは先手が大変だ。"}, {"id": "上級編-022", "no": 22, "chapter": "上級編", "sfen": "ln6l/3s2gk1/3p1gn2/prp3s2/1p1PSPppp/P1R6/1P1bP1PPP/L5GSL/1N4GNK b BP2p 1", "caption": "問題図は△6七角まで", "situation": "振り飛車穴熊対居飛車玉頭位取りの一戦。後手は角交換後、飛車桂両取りに角を打ち込んできた。先手は穴熊の堅さを生かし、攻めを考えていきたい。", "choices": [{"label": "A", "move": "▲4四歩", "expl": "穴熊らしく、飛車取りに構わず急所に歩を突き出していく。"}, {"label": "B", "move": "▲7九飛", "expl": "飛車を逃げながら桂にひもを付けておく。両取りを防ぐならこの一手だ。"}], "correct": "A", "body": "自陣は穴熊が堅く鉄壁なので、チャンスがあれば鋭く切り込んでいきたい。飛車を逃げず、▲4四歩の一着だ。\n\nA▲4四歩△4四同歩△3四歩△4四同金▲6一角（成功図）で穴熊よし。また、4六角成なら△2金引は5六角で、▲7六角成は▲3四角、後手陣は△5六同角成は△同飛いずれも指せる。\n\nB▲7九飛は落ち着いた指し方が、角△4五角成（変化図）で7段手厚い。以下、5四歩、次に▲6一角成を狙って先手陣の8四飛△6一銀が働いていない間に強い戦いを起こすことも視野に入れたい。大局観が重要だった。"}, {"id": "上級編-023", "no": 23, "chapter": "上級編", "sfen": "ln5nl/2kggr3/2ppp4/ps2s1ppp/5p3/PRSb4P/2N1PPPP1/1B2G1S2/L4GKNL b P3p 1", "caption": "問題図は△8四同銀まで", "situation": "相振り飛車の戦型で、双方に動きがあって中盤戦の戦い。先手が8筋から攻めかかり、後手が受ける展開。後手の角と銀が不安定なので、何か手段がありそうだ。", "choices": [{"label": "A", "move": "▲8五銀", "expl": "銀をぶつけながら、角取りにもなっているので厳しい攻めだ。"}, {"label": "B", "move": "▲8二歩", "expl": "手筋の歩。後手玉を飛車の利き筋に入れて技を狙う。"}], "correct": "B", "body": "問題図は後手の角と銀の連係が悪い。先手は8五の角を活用する構想で、攻め筋を組み立てたい。\n\nA▲8五銀は△同銀でうまい。△7五銀には飛車取り、▲8七飛とすると▲6六歩とすると▲6六歩で押さえ込まれるし、▲6六銀切って△同銀（失敗図）で先手が大変だ。\n\nB▲8二歩が好打。△同玉に▲6五桂（正解図）が幸せの胴の一着で、後手がどう応じても先手の駒得となる。▲8八角成、4六、4四同歩△8四角成△8四同銀△6三角成、いずれも先手指せる。歩→桂→歩→桂のコンビネーションが気持ちのよい手順だ。"}, {"id": "上級編-024", "no": 24, "chapter": "上級編", "sfen": "lr5nl/3gk1g2/3s1p1pp/3pp1p2/p1P2P2P/4Nnn2/P+bSPP4/1pGK5/L3G2RL b B2S3Pp 1", "caption": "問題図は△8七角成まで", "situation": "角換わり将棋の終盤戦。後手は桂を連打して先手玉を包囲、△8七角成と強襲をかけてきた。受けを間違えると、たちまち負けになってしまうので落ち着いて対処したい。", "choices": [{"label": "A", "move": "▲8五歩", "expl": "柔らかい受け。「大駒は近づけて受けよ」と格言にある。"}, {"label": "B", "move": "▲8七同金", "expl": "強気に迎え撃つ。△同飛成で竜を作られるが、▲7八銀としかりつけて先手を取る。"}], "correct": "A", "body": "終盤の受けは勝敗に関わってくるので、より慎重に対処しなければいけない。正確な読みが必要となる。\n\nA▲8五歩がふわりとした受けで、△同飛成▲7六銀打（正解図）とがっちり守っておく。先手陣は金銀3枚の連結がよく、後手からの攻めが難しい。\n\nB▲8七同金は攻めを呼び込んでしまう。同飛成▲7八銀△5八金（失敗図）がある。以下、手数は掛かるものの、先手玉は即詰みだ。△5八金、5八同玉、銀△6八銀▲6八玉△5八金、▲6八玉△5八金、いずれも詰みだ。受けても詰めろ駒得が生きる展開になる。感じ。手抜き受けず跳ね返すことができれば、駒得が生きる展開になる。"}, {"id": "上級編-025", "no": 25, "chapter": "上級編", "sfen": "ln1g3nl/1ksg5/1pppPp2p/p5pp1/9/P1P+B1SP2/1P1P1+s2P/2K6/LN5NL b RBGS2Prgp 1", "caption": "問題図は△6二金寄まで", "situation": "ゴキゲン中飛車に対して、先手は二枚銀で急戦を仕掛ける展開。終盤となり、▲5三歩に△6二金寄とかわしたところ。先手玉は薄いが寄せ合いを目指したい。急所の攻めは？", "choices": [{"label": "A", "move": "▲5二金", "expl": "拠点を生かし、打ち込んでいく攻め。守備の駒を剥がしていく感覚。"}, {"label": "B", "move": "▲9五歩", "expl": "美濃囲いに端攻めが有効。6六の馬も好位置なので、より効果的だ。"}], "correct": "B", "body": "美濃囲いの攻略には、横からの攻めと端攻めを絡めるパターンがあり、臨機応変に使い分けたい。A▲5二金は守備駒を剥がす攻めがあり、▲4六成銀▲6二金▲同金▲5七銀（失敗図）が詰みろで寄せ合いに入り、今の手順中、▲2二飛に代えて▲二二金や▲同金、同歩成▲5八飛△二三歩成で先手大変。\n\n横からの攻めは難しいので、B▲9五歩が有効。▲4六成銀▲9四歩△同歩△9三銀△同金△同歩△9三銀（成功図）から詰んでいる。▲4六成銀▲9四歩で6二金も剥がす形となる。▲6三金寄せ形を整えて、ここはほぐさずに端から攻める感覚が正しい。"}, {"id": "上級編-026", "no": 26, "chapter": "上級編", "sfen": "l2gkg1nl/3s5/p3ppspp/2+B6/6pP1/3P1PP2/P1P1+ngS1P/2S4R1/L4K1NL b RBN2Pg3p 1", "caption": "問題図は△3五歩まで", "situation": "角換わり将棋から、後手が超急戦を仕掛けて一気に終盤戦へ突入する展開。先手玉は上部を押さえられて苦しそうだが、後手も駒不足なので何とかしのぎたい。", "choices": [{"label": "A", "move": "▲5八歩", "expl": "飛車と馬の利きを生かし、目の上のタンコブである成桂と金を取り除く。"}, {"label": "B", "move": "▲8三角", "expl": "攻防の角打ち。駒が入れば▲6一角成から詰ます含みもあるし、自陣にも利いている。"}], "correct": "B", "body": "厳しく攻め立てられて、先手玉は風前の灯。次に△3六歩と取り込まれ、歩が絡んでくると受けが難しくなる。\n\nA▲5八歩の催促は▲4八金打すぐ△同銀▲5八同金▲同桂▲4八金打、▲5八同玉でうっかり。しかし、△5八歩△3七歩△3七同金（失敗図）で先手大変。\n\n7四の馬が攻防の好位置にいて、これを生かす手として、B▲8三角（正解図）と連結を断つ好手だ。同桂は△6一角成と後手玉は即詰み。8三同金、6一角成と進み、ピンチをしのいだ格好だ。終盤戦は受け一方ではなく、攻めも見据えた攻防手が望ましい。"}, {"id": "上級編-027", "no": 27, "chapter": "上級編", "sfen": "l4+B1nl/1rp3gk1/5g1p1/p4pp1p/1P5P1/PpPp+b1P1P/1SN1+p4/2GP3R1/LK5NL b 2SNgs2p 1", "caption": "問題図は△8六歩まで", "situation": "一手争いの終盤戦。後手の△8六歩は厳しい手で、▲同銀だと△8七銀で受けなしとなり、先手負け。しかし、現状は先手玉に詰みがなく、この瞬間に寄せきりたい。", "choices": [{"label": "A", "move": "▲2四桂", "expl": "歩頭の桂打ちは、矢倉崩しの手筋。4一に馬がいるので効果は倍増。"}, {"label": "B", "move": "▲2四歩", "expl": "歩で玉頭から攻めていく。飛車と馬のコンビネーションで寄せを狙う。"}], "correct": "A", "body": "矢倉を攻略するには、玉頭から攻める手と横から寄せかせる場合がある。問題図は2八の飛、4一の馬が絶好の配置。持ち駒も豊富で寄せの条件がそろっている。\n\nA▲2四桂（正解図）が好手で、△同歩は▲2三銀同歩で受けなし、で、先手が数まさっている。▲3一桂と打っても▲三三銀同玉で詰みだ。\n\nB▲2四歩も自然な攻めだが、△2三玉（失敗図）で大変、歩があれば▲2四桂の破壊力がまさる。2四桂に△2二金打、▲三三桂成△同金▲2四歩、3二銀不成、3一銀▲2三同歩成、3二玉△同歩成▲二五歩〜▲二四歩で、歩切れの寄せが難しい。"}, {"id": "上級編-028", "no": 28, "chapter": "上級編", "sfen": "+B+P5nl/2+R2sgk1/5g3/p2pp1s1p/6pp1/P3PP2P/5SPP1/+r3G1SK1/+b4G1NL b NL4Pnlp 1", "caption": "問題図は△6四同歩まで", "situation": "先手の振り飛車、後手の玉頭位取り戦法の出だしで終盤戦に入った。互いに竜と馬を作り、駒の損得もなし。盤面全体を見渡して、正しい一着を導き出したい。", "choices": [{"label": "A", "move": "▲2四桂", "expl": "△2三香と打たれると、後手陣のキズが消えてしまう。その前に寄せを狙っていく。"}, {"label": "B", "move": "▲7七歩", "expl": "後手の馬が守りによく利いている。馬を守備に利かせないようにしておく。"}], "correct": "B", "body": "終盤戦に入り、寄せを狙いたいところ。一気にいく場合と、力をためる場合を見極めないと失敗することになる。\n\nA▲2四桂は急戦の一着で、▲3一金▲6四馬同馬△3三馬（失敗図）と進むと後手陣が不安定で、2四の桂が不安定で、先手が忙しい局面だ。\n\nしかし、「馬の守りは金銀3枚」「馬は自陣に引け」などの格言があり、逆に攻めて、敵の馬を自陣に戻すように考える方がよい。B▲7七歩が落ち着いた一手で、もし後手が△2三香と打てば▲6四馬（正解図）で、次に▲4四香も同金▲二馬の狙いが響く。先手は△二三香も同馬の狙いから、後手の馬を封じていることが大きい。"}, {"id": "上級編-029", "no": 29, "chapter": "上級編", "sfen": "l6nl/1r5k1/6gp1/p5p2/2n2P2p/PP4P2/1GBPP4/5G3/L1K4RL b G2SN5Pb2sn3p 1", "caption": "問題図は△7五桂まで", "situation": "一手争いの終盤戦。△7五桂と金取りに打たれた局面は、先手玉にもピンチが訪れている。自玉と敵玉の危険度を考えて、次の一手を選んでほしい。", "choices": [{"label": "A", "move": "▲2五桂", "expl": "攻撃は最大の防御なり。攻め合いに活路を求める。"}, {"label": "B", "move": "▲8八金", "expl": "△8七桂不成、または△8七桂成と金を取られてはいけない。"}], "correct": "A", "body": "終盤戦は一手の緩みが命取りとなるので、慎重に対処したい。詰ますまいの正確な読みが重要となる。\n\n金取りを放置してA▲2五桂が急所の攻め。△8七桂成は▲3三桂成（正解図）から手数ながら即詰みとなる。△8七不成は6八玉と逃げて先手玉が安全になる。\n\n▲2五桂に△7八銀成、同玉△5八桂成、同金▲5八桂成、同金▲5七銀、同銀▲4八玉、6九角と角を取ったの手で6九角となる。後は飛車成（失敗図）から角を取って後手玉に迫り、6九角と銀を取った手で6九角となる。後はB▲8八金とすると失敗図のように玉と桂を取って勝てない。"}, {"id": "上級編-030", "no": 30, "chapter": "上級編", "sfen": "ln1g5/1ksbg4/1ppp1s2l/p3pp2p/4P4/PPPB4P/1S1P1PP2/1KGS2p2/LN2G2+rL b RNn2p 1", "caption": "問題図は△2九飛成まで", "situation": "居飛車対振り飛車の対抗形から飛車交換となり、終盤の入口あたり。先に竜を作られているし、と金攻めが間に合ってくると先手がまずい。どこに目を付けるか。", "choices": [{"label": "A", "move": "▲1二飛", "expl": "取りあえず敵陣に飛車を下ろし、▲1三飛成で香を手に入れる。"}, {"label": "B", "move": "▲9五歩", "expl": "美濃囲いの攻略には端攻めが有効。6六の角を生かして攻めていく。"}], "correct": "B", "body": "先手の銀冠は堅陣だが、後手の美濃囲いも手つかずで、簡単に崩せそうにない。\n\nA▲1二飛は自然な攻めだが、△3九飛成1三飛成△4九と（失敗図）の進行は、と金を持守りの金銀を剥がされそう。先手は桂香を持ても、すぐに有効な攻めがなく、寄せ合い負けとなる。\n\n美濃囲いを横から攻めるのは大変なので、B▲9五歩と打開していく。歩切れなので気つきにくい攻め方だが、△同歩は▲9二歩、今の手順中△同同同同歩は7七桂打とつながる。歩の変化は△同同歩は9二飛角9五同香（正解図）が継続。竜の翼化はあと△同歩で、後手玉に飛車を通す変化より、持ち駒に飛車を温存しているのが大きく、寄せに役立っている。"}];

const KANJI = {
  K:"玉",R:"飛",B:"角",G:"金",S:"銀",N:"桂",L:"香",P:"歩",
  "+R":"龍","+B":"馬","+S":"全","+N":"圭","+L":"杏","+P":"と",
};
const HAND_ORDER = ["R","B","G","S","N","L","P"];
const JP_RANK={'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
const JP_PROM={'龍':'R','馬':'B','全':'S','圭':'N','杏':'L','と':'P'};
const JP_BASE={'玉':'K','飛':'R','角':'B','金':'G','銀':'S','桂':'N','香':'L','歩':'P'};

let cur=0, initSfen="", curSfen="";
let history=[], pickSrc=null, pendingMove=null;
let arrowTargets={};

/* ── SFEN utils ─────────────────────────── */
function split(s){
  const p=s.trim().split(/\s+/);
  return{board:p[0],turn:p[1]||"b",hand:p[2]||"-",move:+(p[3]||1)};
}
function parseBoard(s){
  return s.split("/").map(row=>{
    const c=[];let i=0;
    while(i<row.length){
      const ch=row[i];
      if(/\d/.test(ch)){for(let k=0;k<+ch;k++)c.push(null);i++;}
      else if(ch==="+"){c.push({sym:"+"+row[i+1]});i+=2;}
      else{c.push({sym:ch});i++;}
    }
    return c;
  });
}
function parseHands(s){
  const h={sente:{},gote:{}};
  for(const p of HAND_ORDER){h.sente[p]=0;h.gote[p]=0;}
  if(s==="-")return h;
  let i=0;
  while(i<s.length){
    let n=1;
    if(/\d/.test(s[i])){let j=i;while(j<s.length&&/\d/.test(s[j]))j++;n=+s.slice(i,j);i=j;}
    const c=s[i++],up=c.toUpperCase();
    if(c===up)h.sente[up]=(h.sente[up]||0)+n;
    else h.gote[up]=(h.gote[up]||0)+n;
  }
  return h;
}
function buildBoard(grid){
  return grid.map(row=>{
    let s="",e=0;
    for(const c of row){if(!c){e++;}else{if(e){s+=e;e=0;}s+=c.sym;}}
    if(e)s+=e;return s;
  }).join("/");
}
function buildHand(h){
  let s="";
  for(const p of HAND_ORDER){const n=h.sente[p]||0;if(n>0)s+=(n>1?n:"")+p;}
  for(const p of HAND_ORDER){const n=h.gote[p]||0;if(n>0)s+=(n>1?n:"")+p.toLowerCase();}
  return s||"-";
}
function parseUsi(u){return[+u[0],u.charCodeAt(1)-96];}
function rc(u){const[f,r]=parseUsi(u);return[r-1,9-f];}

/* ── Piece utils ────────────────────────── */
function isMine(cell,turn){
  if(!cell)return false;
  const s=cell.sym;
  if(turn==="b"){
    return s.startsWith("+")?s[1]===s[1].toUpperCase():s===s.toUpperCase()&&s.length===1;
  }
  return s.startsWith("+")?s[1]===s[1].toLowerCase():s===s.toLowerCase()&&s.length===1;
}
function canProm(sym){
  if(sym.startsWith("+"))return false;
  const u=sym.toUpperCase();return u!=="K"&&u!=="G";
}
function mustProm(sym,toR,turn){
  const b=(sym.startsWith("+")?sym[1]:sym).toUpperCase();
  if(turn==="b"){if(b==="P"||b==="L")return toR===1;if(b==="N")return toR<=2;}
  else{if(b==="P"||b==="L")return toR===9;if(b==="N")return toR>=8;}
  return false;
}
function enemy(rank,turn){return turn==="b"?rank<=3:rank>=7;}

/* ── Apply move ─────────────────────────── */
function applyMove(fromUsi,toUsi,promote){
  const{board,turn,hand,move}=split(curSfen);
  const grid=parseBoard(board),hands=parseHands(hand);
  const[toR,toC]=rc(toUsi);

  const cap=grid[toR][toC];
  if(cap){
    const cu=cap.sym.replace("+","").toUpperCase();
    if(turn==="b")hands.sente[cu]=(hands.sente[cu]||0)+1;
    else hands.gote[cu]=(hands.gote[cu]||0)+1;
  }

  let newSym;
  if(!fromUsi){
    const dc=pickSrc.drop,p=dc.toUpperCase();
    if(turn==="b")hands.sente[p]=Math.max(0,(hands.sente[p]||0)-1);
    else hands.gote[p]=Math.max(0,(hands.gote[p]||0)-1);
    newSym=turn==="b"?p:p.toLowerCase();
  }else{
    const[fR,fC]=rc(fromUsi),piece=grid[fR][fC];
    if(!piece){pickSrc=null;render();return;}
    grid[fR][fC]=null;
    newSym=promote?"+"+piece.sym.replace("+",""):piece.sym;
  }

  grid[toR][toC]={sym:newSym};
  history.push({sfen:curSfen});
  curSfen=`${buildBoard(grid)} ${turn==="b"?"w":"b"} ${buildHand(hands)} ${move+1}`;
