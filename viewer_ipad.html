  pickSrc=null;render();
}

/* ── Tap handlers ───────────────────────── */
function onSq(usi){
  const{board,turn}=split(curSfen);
  const grid=parseBoard(board);
  const[row,col]=rc(usi);const cell=grid[row][col];

  if(!pickSrc){
    if(cell&&isMine(cell,turn)){pickSrc={from:usi};render();}
    return;
  }
  if(pickSrc.drop){
    if(cell){pickSrc=null;if(isMine(cell,turn))pickSrc={from:usi};}
    else applyMove(null,usi,false);
    render();return;
  }
  if(pickSrc.from===usi){pickSrc=null;render();return;}
  if(cell&&isMine(cell,turn)){pickSrc={from:usi};render();return;}

  const[fR,fC]=rc(pickSrc.from),fromCell=grid[fR][fC];
  if(!fromCell){pickSrc=null;render();return;}
  const[,toRank]=parseUsi(usi),[,fromRank]=parseUsi(pickSrc.from);

  if(canProm(fromCell.sym)&&(enemy(toRank,turn)||enemy(fromRank,turn))){
    if(mustProm(fromCell.sym,toRank,turn)){
      applyMove(pickSrc.from,usi,true);
    }else{
      pendingMove={from:pickSrc.from,to:usi};
      document.getElementById("promo-modal").classList.add("active");
    }
  }else{
    applyMove(pickSrc.from,usi,false);
  }
}

function onHand(side,p){
  const{turn}=split(curSfen);
  if((side==="sente")!==(turn==="b"))return;
  pickSrc={drop:side==="sente"?p:p.toLowerCase()};render();
}

/* ── Audio ──────────────────────────────── */
let _audioCtx=null;
function _getCtx(){
  if(!_audioCtx)try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  if(_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume();
  return _audioCtx;
}
document.addEventListener('pointerdown',()=>{_getCtx();},{once:true,passive:true});
function playPingPon(){
  try{
    const ctx=_getCtx();if(!ctx)return;
    [[880,0,0.16],[660,0.22,0.16]].forEach(([freq,start,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0.28,ctx.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur);
    });
  }catch(e){}
}

/* ── Arrow helpers ──────────────────────── */
function parseMoveJpToUsi(mv){
  const m=mv.match(/([1-9])([一二三四五六七八九])/);
  if(!m)return null;
  const file=+m[1],rank=JP_RANK[m[2]];
  const toU=`${file}${String.fromCharCode(96+rank)}`;
  const src=mv.match(/\(([1-9])([1-9])\)/);
  const frU=src?`${+src[1]}${String.fromCharCode(96+ +src[2])}`:null;
  return{to:toU,from:frU};
}
function getSqSize(){
  const el=document.querySelector('.sq');
  if(el){const w=el.getBoundingClientRect().width;if(w>0)return w;}
  return Math.min(58,(window.innerWidth-20)/9);
}
function getSqCenter(usi){
  const[file,rank]=parseUsi(usi);const sq=getSqSize();
  return{x:(9.5-file)*sq,y:(rank-0.5)*sq};
}
function boardMatchesInitial(){
  const a=split(curSfen),b=split(initSfen);
  return a.board===b.board&&a.hand===b.hand&&a.turn===b.turn;
}
function usiFromPoint(cx,cy){
  const boardEl=document.getElementById('board-grid');
  if(!boardEl)return null;
  const br=boardEl.getBoundingClientRect(),sq=getSqSize();
  const bx=cx-(br.left+2),by=cy-br.top;
  if(bx<0||bx>=9*sq||by<0||by>=9*sq)return null;
  const file=9-Math.floor(bx/sq),rank=Math.floor(by/sq)+1;
  if(file<1||file>9||rank<1||rank>9)return null;
  return`${file}${String.fromCharCode(96+rank)}`;
}

function canReach(fSrc,rSrc,fDst,rDst,sym,turn,grid){
  const df=fDst-fSrc,dr=rDst-rSrc;
  const fwd=turn==='b'?-1:1;
  const prom=sym.startsWith('+');
  const base=(prom?sym[1]:sym).toUpperCase();
  const pathClear=(f0,r0,f1,r1)=>{
    const sf=f1>f0?1:f1<f0?-1:0,sr=r1>r0?1:r1<r0?-1:0;
    let f=f0+sf,r=r0+sr;
    while(f!==f1||r!==r1){if(grid[r-1][9-f])return false;f+=sf;r+=sr;}
    return true;
  };
  if(!prom){
    if(base==='P')return df===0&&dr===fwd;
    if(base==='L')return df===0&&dr*fwd>0&&pathClear(fSrc,rSrc,fDst,rDst);
    if(base==='N')return Math.abs(df)===1&&dr===fwd*2;
    if(base==='S')return(dr===fwd&&Math.abs(df)<=1)||(dr===-fwd&&Math.abs(df)===1);
    if(base==='G')return(Math.abs(df)+Math.abs(dr)===1)||(Math.abs(df)===1&&dr===fwd);
    if(base==='K')return Math.abs(df)<=1&&Math.abs(dr)<=1&&!!(df||dr);
    if(base==='B')return Math.abs(df)===Math.abs(dr)&&df!==0&&pathClear(fSrc,rSrc,fDst,rDst);
    if(base==='R')return(df===0||dr===0)&&!!(df||dr)&&pathClear(fSrc,rSrc,fDst,rDst);
  }else{
    if(['P','L','N','S'].includes(base))
      return(Math.abs(df)+Math.abs(dr)===1)||(Math.abs(df)===1&&dr===fwd);
    if(base==='B'){
      if(Math.abs(df)===Math.abs(dr)&&df!==0)return pathClear(fSrc,rSrc,fDst,rDst);
      return Math.abs(df)<=1&&Math.abs(dr)<=1&&!!(df||dr);
    }
    if(base==='R'){
      if((df===0||dr===0)&&!!(df||dr))return pathClear(fSrc,rSrc,fDst,rDst);
      return Math.abs(df)<=1&&Math.abs(dr)<=1&&!!(df||dr);
    }
  }
  return false;
}

function findMoveSource(mv,toFile,toRank,grid){
  const moveTurn=mv.includes('▲')?'b':'w';
  if(mv.includes('打'))return null;
  let baseSym=null,isProm=false;
  for(const[jp,s]of Object.entries(JP_PROM)){if(mv.includes(jp)){baseSym=s;isProm=true;break;}}
  if(!baseSym)for(const[jp,s]of Object.entries(JP_BASE)){if(mv.includes(jp)){baseSym=s;break;}}
  if(!baseSym)return null;
  const cands=[];
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const cell=grid[r][c];if(!cell)continue;
      const sym=cell.sym;
      const prom=sym.startsWith('+');
      const base=(prom?sym[1]:sym).toUpperCase();
      if(base!==baseSym||prom!==isProm)continue;
      const isGote=prom?sym[1]===sym[1].toLowerCase():sym===sym.toLowerCase();
      if(moveTurn==='b'&&isGote)continue;
      if(moveTurn==='w'&&!isGote)continue;
      const cf=9-c,cr=r+1;
      if(canReach(cf,cr,toFile,toRank,sym,moveTurn,grid))
        cands.push([cf,cr]);
    }
  }
  if(!cands.length)return null;
  if(cands.length===1)return cands[0];
  /* disambiguation suffixes — 右/左 from mover's view */
  if(mv.includes('右')){
    cands.sort(([f1],[f2])=>moveTurn==='b'?f2-f1:f1-f2);return cands[0];
  }
  if(mv.includes('左')){
    cands.sort(([f1],[f2])=>moveTurn==='b'?f1-f2:f2-f1);return cands[0];
  }
  if(mv.includes('上')){
    cands.sort(([,r1],[,r2])=>moveTurn==='b'?r1-r2:r2-r1);return cands[0];
  }
  if(mv.includes('下')){
    cands.sort(([,r1],[,r2])=>moveTurn==='b'?r2-r1:r1-r2);return cands[0];
  }
  if(mv.includes('直')){
    const direct=cands.filter(([f])=>f===toFile);
    if(direct.length)return direct[0];
  }
  cands.sort(([f1,r1],[f2,r2])=>
    (Math.abs(f1-toFile)+Math.abs(r1-toRank))-(Math.abs(f2-toFile)+Math.abs(r2-toRank))
  );
  return cands[0];
}

function drawArrows(){
  arrowTargets={};
  const svg=document.getElementById('arrow-svg');
  svg.innerHTML='';
  if(!boardMatchesInitial())return;
  const p=PROBLEMS[cur];
  if(!p.choices||!p.choices.length)return;
  const sq=getSqSize();
  if(!sq||sq<=0)return;
  svg.setAttribute('width',9*sq);svg.setAttribute('height',9*sq);
  const{board}=split(curSfen);
  const grid=parseBoard(board);
  const COLORS={A:'#1a4acc',B:'#30b8e0'};
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  for(const[lbl,col]of Object.entries(COLORS)){
    const mk=document.createElementNS('http://www.w3.org/2000/svg','marker');
    mk.setAttribute('id','arrMk'+lbl);mk.setAttribute('markerWidth','5');
    mk.setAttribute('markerHeight','4');mk.setAttribute('refX','4');
    mk.setAttribute('refY','2');mk.setAttribute('orient','auto');
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','0 0,5 2,0 4');poly.setAttribute('fill',col);
    mk.appendChild(poly);defs.appendChild(mk);
  }
  svg.appendChild(defs);
  for(const c of p.choices){
    const col=COLORS[c.label];if(!col)continue;
    const parsed=parseMoveJpToUsi(c.move);if(!parsed)continue;
    const[toFile,toRank]=parseUsi(parsed.to);
    arrowTargets[parsed.to]=c.label;
    const to=getSqCenter(parsed.to);
    /* find source */
    let fromUsi=parsed.from;
    const isDrop=c.move.includes('打');
    if(!fromUsi&&!isDrop){
      const src=findMoveSource(c.move,toFile,toRank,grid);
      if(src)fromUsi=`${src[0]}${String.fromCharCode(96+src[1])}`;
    }
    /* destination highlight */
    const hl=document.createElementNS('http://www.w3.org/2000/svg','rect');
    hl.setAttribute('x',to.x-sq*0.46);hl.setAttribute('y',to.y-sq*0.46);
    hl.setAttribute('width',sq*0.92);hl.setAttribute('height',sq*0.92);
    hl.setAttribute('rx','3');hl.setAttribute('fill',col);hl.setAttribute('opacity','0.15');
    svg.appendChild(hl);
    /* arrow line */
    const drawLine=(x1,y1,x2,y2)=>{
      const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=dx/len,ny=dy/len;
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1+nx*sq*0.1);line.setAttribute('y1',y1+ny*sq*0.1);
      line.setAttribute('x2',x2-nx*sq*0.38);line.setAttribute('y2',y2-ny*sq*0.38);
      line.setAttribute('stroke',col);line.setAttribute('stroke-width','3');
      line.setAttribute('stroke-linecap','round');line.setAttribute('opacity','0.88');
      line.setAttribute('marker-end',`url(#arrMk${c.label})`);
      svg.appendChild(line);
    };
    if(fromUsi){
      const fr=getSqCenter(fromUsi);drawLine(fr.x,fr.y,to.x,to.y);
    }else if(isDrop){
      const moveTurn=c.move.includes('▲')?'b':'w';
      const handEl=document.getElementById(moveTurn==='b'?'hand-sente':'hand-gote');
      const boardEl=document.getElementById('board-grid');
      if(handEl&&boardEl){
        const br=boardEl.getBoundingClientRect(),hr=handEl.getBoundingClientRect();
        const hx=hr.left+hr.width/2-(br.left+2);
        const hy=hr.top+hr.height/2-br.top;
        drawLine(hx,hy,to.x,to.y);
      }
    }
    /* label */
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',to.x-sq*0.44);t.setAttribute('y',to.y-sq*0.26);
    t.setAttribute('text-anchor','start');
    t.setAttribute('font-size',sq*0.22);t.setAttribute('font-weight','bold');
    t.setAttribute('fill',col);t.setAttribute('stroke','rgba(0,0,0,0.8)');
    t.setAttribute('stroke-width','1.5');t.setAttribute('paint-order','stroke');
    t.textContent=c.label;svg.appendChild(t);
  }
}

/* ── Render ─────────────────────────────── */
function render(){
  const{board,turn,hand}=split(curSfen);
  const grid=parseBoard(board),hands=parseHands(hand);
  const el=document.getElementById("board-grid");
  el.innerHTML="";

  for(let r=1;r<=9;r++){
    for(let col=0;col<9;col++){
      const file=9-col,usi=`${file}${String.fromCharCode(96+r)}`;
      const cell=grid[r-1][col];
      const sq=document.createElement("div");sq.className="sq";
      if(cell){
        const sym=cell.sym,prom=sym.startsWith("+");
        const isGote=prom?sym[1]===sym[1].toLowerCase():sym===sym.toLowerCase();
        const key=prom?"+"+sym[1].toUpperCase():sym.toUpperCase();
        const span=document.createElement("span");
        span.className=(isGote?"gote":"sente")+(prom?" promoted":"");
        span.textContent=KANJI[key]||key;
        sq.appendChild(span);
      }
      if(pickSrc&&pickSrc.from===usi)sq.classList.add("selected");
      el.appendChild(sq);
    }
  }
  renderHand("hand-gote",hands.gote,"gote");
  renderHand("hand-sente",hands.sente,"sente");
  const ti=document.getElementById("turn-ind");
  ti.textContent=turn==="b"?"▲ 先手番":"△ 後手番";
  ti.style.color=turn==="b"?"#e8e8e8":"#ff9966";
  drawArrows();
}

function renderHand(elId,hand,side){
  const el=document.getElementById(elId);el.innerHTML="";
  let any=false;
  for(const p of HAND_ORDER){
    const n=hand[p]||0;if(n<=0)continue;any=true;
    const dc=side==="sente"?p:p.toLowerCase();
    const piece=document.createElement("div");
    piece.className=`hand-piece ${side}`;
    if(pickSrc&&pickSrc.drop===dc)piece.classList.add("selected");
    piece.textContent=KANJI[p];
    if(n>1){const c=document.createElement("div");c.className="count";c.textContent=n;piece.appendChild(c);}
    piece.addEventListener("pointerup",(e)=>{e.preventDefault();onHand(side,p);});
    el.appendChild(piece);
  }
  if(!any){const e=document.createElement("span");e.className="hand-empty";e.textContent="なし";el.appendChild(e);}
}

/* ── Load problem ───────────────────────── */
function load(idx){
  cur=idx;const p=PROBLEMS[cur];
  initSfen=p.sfen;curSfen=p.sfen;history=[];pickSrc=null;
  document.getElementById("progress").textContent=`${cur+1} / ${PROBLEMS.length}`;
  document.getElementById("diagram-caption").textContent=p.caption||"";
  document.getElementById("situation-text").textContent=p.situation||"";
  const ch=document.getElementById("choices");ch.innerHTML="";
  for(const c of (p.choices||[])){
    const btn=document.createElement("button");
    btn.className="choice-btn";btn.dataset.label=c.label;
    btn.innerHTML=`<b>${c.label}</b><br>${c.move}`;
    btn.addEventListener("pointerup",(e)=>{e.preventDefault();onChoice(c.label);});
    ch.appendChild(btn);
  }
  document.getElementById("reveal-btn").classList.remove("hidden");
  document.getElementById("answer-area").classList.add("hidden");
  render();
}

function onChoice(label){
  const p=PROBLEMS[cur],correct=p.correct;
  if(label===correct)playPingPon();
  document.querySelectorAll(".choice-btn").forEach(btn=>{
    if(btn.dataset.label===label)btn.classList.add(label===correct?"correct":"wrong");
    if(btn.dataset.label===correct&&label!==correct)btn.classList.add("correct");
  });
  showAnswer();
}
function showAnswer(){
  const p=PROBLEMS[cur];
  document.getElementById("reveal-btn").classList.add("hidden");
  document.getElementById("answer-area").classList.remove("hidden");
  document.getElementById("correct-label").textContent=`正解: ${p.correct}`;
  document.getElementById("answer-text").textContent=p.body||"";
}

/* ── Promote modal ──────────────────────── */
document.getElementById("promo-yes").addEventListener("pointerup",(e)=>{
  e.preventDefault();
  document.getElementById("promo-modal").classList.remove("active");
  if(pendingMove){applyMove(pendingMove.from,pendingMove.to,true);pendingMove=null;}
});
document.getElementById("promo-no").addEventListener("pointerup",(e)=>{
  e.preventDefault();
  document.getElementById("promo-modal").classList.remove("active");
  if(pendingMove){applyMove(pendingMove.from,pendingMove.to,false);pendingMove=null;}
});

/* ── Controls ───────────────────────────── */
document.getElementById("prev-btn").addEventListener("pointerup",(e)=>{e.preventDefault();if(cur>0)load(cur-1);});
document.getElementById("next-btn").addEventListener("pointerup",(e)=>{e.preventDefault();if(cur<PROBLEMS.length-1)load(cur+1);});
document.getElementById("reset-btn").addEventListener("pointerup",(e)=>{e.preventDefault();curSfen=initSfen;history=[];pickSrc=null;render();});
document.getElementById("prob-btn").addEventListener("pointerup",(e)=>{e.preventDefault();curSfen=initSfen;history=[];pickSrc=null;render();});
document.getElementById("undo-btn").addEventListener("pointerup",(e)=>{e.preventDefault();if(history.length){curSfen=history.pop().sfen;pickSrc=null;render();}});
document.getElementById("reveal-btn").addEventListener("pointerup",(e)=>{e.preventDefault();showAnswer();});

/* ── Board interaction (event delegation) ── */
let _lpTimer=null,_lpX=0,_lpY=0,_lpFired=false;
const _bg=document.getElementById('board-grid');
_bg.addEventListener('pointerdown',(e)=>{
  _lpFired=false;_lpX=e.clientX;_lpY=e.clientY;
  _lpTimer=setTimeout(()=>{
    _lpTimer=null;_lpFired=true;
    pickSrc=null;
    const usi=usiFromPoint(_lpX,_lpY);
    if(usi&&boardMatchesInitial()&&arrowTargets[usi]){onChoice(arrowTargets[usi]);}
    else{showAnswer();}
  },2000);
});
_bg.addEventListener('pointerup',(e)=>{
  e.preventDefault();
  if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
  if(_lpFired){_lpFired=false;return;}
  const usi=usiFromPoint(e.clientX,e.clientY);
  if(usi)onSq(usi);
});
_bg.addEventListener('pointercancel',()=>{if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}_lpFired=false;});
_bg.addEventListener('pointermove',(e)=>{
  if(_lpTimer&&(Math.abs(e.clientX-_lpX)+Math.abs(e.clientY-_lpY))>12){clearTimeout(_lpTimer);_lpTimer=null;}
});
_bg.addEventListener('contextmenu',(e)=>e.preventDefault());

load(0);
</script>
